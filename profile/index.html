<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      background: rgb(54,18,18);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .back-btn {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }

    .back-btn:hover { color: white; }
    
    .profile-box {
      width: 340px;
      padding: 35px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      text-align: center;
    }
    .avatar-wrapper {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 18px;
      cursor: pointer;
    }
    .avatar-wrapper:hover .avatar-overlay { opacity: 1; }
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }
    .avatar-overlay {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
      font-size: 12px;
      color: white;
      flex-direction: column;
      gap: 4px;
    }
    .avatar-overlay svg { width: 22px; height: 22px; }
    #file-input { display: none; }
    .preview-badge {
      font-size: 11px;
      color: #aaa;
      margin-bottom: 12px;
      display: none;
    }
    .preview-badge.visible { display: block; }
    .edit-inputs { margin-top: 20px; text-align: left; }
    label { font-size: 12px; color: #ccc; display: block; margin-bottom: 5px; }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.2);
      color: white;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: white;
      color: black;
      font-weight: bold;
      margin-top: 10px;
      cursor: pointer;
    }
    .btn-save { background: #4CAF50; color: white; }
    .debug {
      font-size: 10px;
      color: #888;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="profile-box">

    <div class="avatar-wrapper" onclick="document.getElementById('file-input').click()">
      <img id="avatar" class="avatar" src="">
      <div class="avatar-overlay">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
        </svg>
        <span id="overlay-label"></span>
      </div>
    </div>
    
    <a class="back-btn" id="back-btn" href="/">← Home</a>

    <input type="file" id="file-input" accept=".png,.jpg,.jpeg" onchange="previewImage(event)">
    <p class="preview-badge" id="preview-badge"></p>

<h1 id="name">User</h1>
    <p id="email"></p>

    <div class="edit-inputs">
      <label id="label-name" for="input-name"></label>
      <input type="text" id="input-name">
    </div>

    <button id="btn-save" class="btn-save" onclick="updateProfile()"></button>
    <button id="btn-logout" onclick="logout()"></button>
  </div>

  <script>
    const SUPABASE_URL = "https://ysffeiaeuuuhfxkwtumt.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzZmZlaWFldXV1aGZ4a3d0dW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTY3NjgsImV4cCI6MjA5MzEzMjc2OH0.fLCVXeNcUsycEiUlelLYwJQ4AGmG_MiL8ri2i5SXlmg";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ── i18n ─────────────────────────────────────────────
    const translations = {
      it: {
        changePhoto:    "Cambia foto",
        previewBadge:   "⚠️ Anteprima — salva per confermare",
        labelName:      "Nuovo Nome",
        placeholderName:"Inserisci nome",
        btnSave:        "Salva Modifiche",
        btnLogout:      "Esci",
        alertError:     "Errore durante l'aggiornamento: ",
        alertSuccess:   "Profilo aggiornato con successo!",
      },
      en: {
        changePhoto:    "Change photo",
        previewBadge:   "⚠️ Preview — save to confirm",
        labelName:      "New Name",
        placeholderName:"Enter name",
        btnSave:        "Save Changes",
        btnLogout:      "Logout",
        alertError:     "Update error: ",
        alertSuccess:   "Profile updated successfully!",
      },
      uk: {
        changePhoto:    "Змінити фото",
        previewBadge:   "⚠️ Попередній перегляд — збережіть для підтвердження",
        labelName:      "Нове ім'я",
        placeholderName:"Введіть ім'я",
        btnSave:        "Зберегти зміни",
        btnLogout:      "Вийти",
        alertError:     "Помилка оновлення: ",
        alertSuccess:   "Профіль успішно оновлено!",
      },
    };

    // Stessa logica della pagina che funziona
    var _nav = navigator.language || navigator.userLanguage || 'en';
    var lang = _nav.startsWith('it') ? 'it' : _nav.startsWith('uk') ? 'uk' : 'en';
    const t = translations[lang];

    function applyTranslations() {
      document.getElementById("overlay-label").textContent = t.changePhoto;
      document.getElementById("preview-badge").textContent = t.previewBadge;
      document.getElementById("label-name").textContent    = t.labelName;
      document.getElementById("input-name").placeholder    = t.placeholderName;
      document.getElementById("btn-save").textContent      = t.btnSave;
      document.getElementById("btn-logout").textContent    = t.btnLogout;
    }

    let newAvatarBase64 = null;

    async function loadUser() {
      const { data: { user } } = await client.auth.getUser();
      if (!user) { window.location.href = "/login"; return; }

      document.getElementById("email").innerText   = user.email;
      const currentName   = user.user_metadata?.full_name || "User";
      const currentAvatar = user.user_metadata?.avatar_url ||
        "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";

      document.getElementById("name").innerText   = currentName;
      document.getElementById("avatar").src       = currentAvatar;
      document.getElementById("input-name").value = currentName;

      newAvatarBase64 = null;
      document.getElementById("preview-badge").classList.remove("visible");
      document.getElementById("file-input").value = "";
    }

    function previewImage(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        newAvatarBase64 = e.target.result;
        document.getElementById("avatar").src = newAvatarBase64;
        document.getElementById("preview-badge").classList.add("visible");
      };
      reader.readAsDataURL(file);
    }

    async function updateProfile() {
      const newName = document.getElementById("input-name").value;
      const updateData = { full_name: newName };
      if (newAvatarBase64) updateData.avatar_url = newAvatarBase64;

      const { error } = await client.auth.updateUser({ data: updateData });
      if (error) {
        alert(t.alertError + error.message);
      } else {
        alert(t.alertSuccess);
        loadUser();
      }
    }

    async function logout() {
      await client.auth.signOut();
      window.location.href = "/login";
    }

    applyTranslations();
    loadUser();
  </script>
</body>
</html>
