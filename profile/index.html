<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <script src="https://jsdelivr.net"></script>
  <style>
    body {
      margin: 0;
      background: rgb(54,18,18);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .profile-box {
      width: 340px;
      padding: 35px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      text-align: center;
    }
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 18px;
    }
    .edit-inputs {
      margin-top: 20px;
      text-align: left;
    }
    label {
      font-size: 12px;
      color: #ccc;
      display: block;
      margin-bottom: 5px;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.2);
      color: white;
      box-sizing: border-box;
    }
    input[type="file"] {
      margin-bottom: 15px;
      color: #ccc;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: white;
      color: black;
      font-weight: bold;
      margin-top: 10px;
      cursor: pointer;
    }
    .btn-save {
      background: #4CAF50;
      color: white;
    }
    button:disabled {
      background: #555;
      color: #aaa;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div class="profile-box">
    <img id="avatar" class="avatar">
    <h1 id="name">User</h1>
    <p id="email"></p>

    <div class="edit-inputs">
      <label for="input-name">Nuovo Nome</label>
      <input type="text" id="input-name" placeholder="Inserisci nome">

      <label for="input-file">Carica Nuova Immagine</label>
      <input type="file" id="input-file" accept="image/*">
    </div>

    <button id="btn-save" class="btn-save" onclick="updateProfile()">Salva Modifiche</button>
    <button onclick="logout()">Logout</button>
  </div>

  <script>
    const SUPABASE_URL = "https://supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzZmZlaWFldXV1aGZ4a3d0dW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTY3NjgsImV4cCI6MjA5MzEzMjc2OH0.fLCVXeNcUsycEiUlelLYwJQ4AGmG_MiL8ri2i5SXlmg";
    
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null;

    async function loadUser() {
      const { data: { user } } = await client.auth.getUser();

      if (!user) {
        window.location.href = "/login";
        return;
      }

      currentUser = user;

      document.getElementById("email").innerText = user.email;
      
      const currentName = user.user_metadata?.full_name || "User";
      const currentAvatar = user.user_metadata?.avatar_url || "https://flaticon.com";

      document.getElementById("name").innerText = currentName;
      document.getElementById("avatar").src = currentAvatar;
      document.getElementById("input-name").value = currentName;
      document.getElementById("input-file").value = ""; // Resetta la selezione file
    }

    async function updateProfile() {
      const btnSave = document.getElementById("btn-save");
      const newName = document.getElementById("input-name").value;
      const fileInput = document.getElementById("input-file");
      const file = fileInput.files[0];
      
      let avatarUrl = currentUser.user_metadata?.avatar_url;

      // Disabilita il pulsante per evitare click multipli durante il caricamento
      btnSave.disabled = true;
      btnSave.innerText = "Salvataggio in corso...";

      // 1. Se l'utente ha selezionato un file, esegui l'upload su Supabase Storage
      if (file) {
        const fileExt = file.name.split('.').pop();
        // Crea un nome file unico usando l'ID utente e il timestamp per evitare duplicati
        const fileName = `${currentUser.id}/${Date.now()}.${fileExt}`;

        const { data: uploadData, error: uploadError } = await client.storage
          .from('avatars')
          .upload(fileName, file, { upsert: true });

        if (uploadError) {
          alert("Errore nel caricamento dell'immagine: " + uploadError.message);
          btnSave.disabled = false;
          btnSave.innerText = "Salva Modifiche";
          return;
        }

        // 2. Recupera l'URL pubblico dell'immagine caricata
        const { data: { publicUrl } } = client.storage
          .from('avatars')
          .getPublicUrl(fileName);

        avatarUrl = publicUrl;
      }

      // 3. Aggiorna i metadati dell'utente con il nuovo nome e il nuovo URL dell'immagine
      const { error: authError } = await client.auth.updateUser({
        data: { 
          full_name: newName,
          avatar_url: avatarUrl
        }
      });

      if (authError) {
        alert("Errore durante l'aggiornamento del profilo: " + authError.message);
      } else {
        alert("Profilo aggiornato con successo!");
        await loadUser();
      }

      // Ripristina il pulsante
      btnSave.disabled = false;
      btnSave.innerText = "Salva Modifiche";
    }

    async function logout() {
      await client.auth.signOut();
      window.location.href = "/login";
    }

    loadUser();
  </script>
</body>
</html>
