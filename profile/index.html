<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Profile</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    body {

      margin: 0;

      background: rgb(54,18,18);

      color: white;

      font-family:
        'Segoe UI',
        sans-serif;

      display: flex;

      justify-content: center;
      align-items: center;

      height: 100vh;
    }

    .profile-box {

      width: 340px;

      padding: 35px;

      border-radius: 20px;

      background:
        rgba(255,255,255,0.05);

      backdrop-filter: blur(10px);

      text-align: center;
    }

    .avatar {

      width: 100px;
      height: 100px;

      border-radius: 50%;

      object-fit: cover;

      margin-bottom: 18px;
    }

    button {

      width: 100%;

      padding: 12px;

      border: none;

      border-radius: 12px;

      background: white;

      color: black;

      font-weight: bold;

      margin-top: 20px;

      cursor: pointer;
    }

  </style>

</head>
<body>

  <div class="profile-box">

    <img
      id="avatar"
      class="avatar"
    >

    <h1 id="name">
      User
    </h1>

    <p id="email"></p>

    <button onclick="logout()">
      Logout
    </button>

  </div>

  <script>

    const SUPABASE_URL =
      "https://ysffeiaeuuuhfxkwtumt.supabase.co";

    const SUPABASE_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzZmZlaWFldXV1aGZ4a3d0dW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTY3NjgsImV4cCI6MjA5MzEzMjc2OH0.fLCVXeNcUsycEiUlelLYwJQ4AGmG_MiL8ri2i5SXlmg";

    const client =
      window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY
      );

    async function loadUser() {

      const {
        data: { user }
      } = await client.auth.getUser();

      if (!user) {

        window.location.href =
          "/login";

        return;
      }

      document
        .getElementById("email")
        .innerText =
          user.email;

      document
        .getElementById("name")
        .innerText =

          user.user_metadata.full_name ||

          "User";

      document
        .getElementById("avatar")
        .src =

          user.user_metadata.avatar_url ||

          "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
    }

    async function logout() {

      await client.auth.signOut();

      window.location.href =
        "/login";
    }

    loadUser();

  </script>

</body>
</html>
