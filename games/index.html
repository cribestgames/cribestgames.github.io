<!DOCTYPE html>
<html lang="en">
<head>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9156802341247934" crossorigin="anonymous"></script>
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CribestGames</title>
  <meta name="description" content="Play free browser games on CribestGames.">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      overscroll-behavior: none;
      overscroll-behavior-y: none;
      -webkit-overflow-scrolling: auto;
    }

    body {
      background-color: rgb(54, 18, 18);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-tap-highlight-color: transparent;
    }

    header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
    }

    .back-btn {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }

    .back-btn:hover { color: white; }

    .site-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.85);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 6px 0 14px;
      text-align: center;
      letter-spacing: 0.03em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .game-preview {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16/9;
      border-radius: 10px;
      overflow: hidden;
      background: black;
      box-shadow: 0 4px 30px rgba(0,0,0,0.6);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game-preview img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.45;
    }

    .play-btn {
      position: relative;
      z-index: 10;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 90px;
      color: white;
      text-shadow: 0 0 40px rgba(0,0,0,0.8);
      user-select: none;
    }

    /* ── FAKE FULLSCREEN OVERLAY ── */
    #fake-fs {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgb(54, 18, 18);
      flex-direction: row;
    }

    #fake-fs.active {
      display: flex;
    }

    #fs-sidebar {
      width: 20px;
      flex-shrink: 0;
      background: rgb(54, 18, 18);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      position: relative;
      z-index: 2;
    }

    #fs-exit-label {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      transition: color 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }

    #fs-sidebar:hover #fs-exit-label,
    #fs-sidebar:active #fs-exit-label {
      color: rgba(255,255,255,0.95);
    }

    #fs-iframe-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: black;
    }

    #fs-iframe-container iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── LANDSCAPE OVERLAY ── */
    #landscape-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 10;
      background: black;
      align-items: center;
      justify-content: center;
    }

    #landscape-overlay.visible {
      display: flex;
    }

    #landscape-overlay svg {
      width: 160px;
      height: 160px;
    }

    /* ── fine fake fullscreen ── */

    .description {
      width: 100%;
      max-width: 900px;
      margin: 18px 0 30px;
      padding: 0 16px;
      font-size: 14px;
      line-height: 1.6;
      color: rgba(255,255,255,0.75);
      text-align: center;
    }

    .more-games {
      width: 100%;
      max-width: 900px;
      margin: 0 auto 32px;
      padding: 0 16px;
    }

    .more-games-title {
      font-size: 16px;
      color: rgba(255,255,255,0.9);
      margin: 0 0 16px;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .more-games-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }

    .more-game-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      text-decoration: none;
      color: white;
      transition: transform 0.2s ease, background-color 0.2s ease;
      min-height: 170px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
    }

    .more-game-item:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.12);
    }

    .more-game-item img {
      width: 64px;
      height: 64px;
      object-fit: contain;
    }

    .more-game-item span {
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      line-height: 1.3;
      color: rgba(255,255,255,0.95);
      text-transform: none;
      word-break: break-word;
    }

    .license {
      margin-top: auto;
      padding: 14px;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
    }

    .error-msg {
      display: none;
      margin-top: 60px;
      font-size: 18px;
      color: rgba(255,255,255,0.6);
      text-align: center;
    }
  </style>
</head>

<body>

<!-- FAKE FULLSCREEN -->
<div id="fake-fs">
  <div id="fs-sidebar" title="Exit">
    <span id="fs-exit-label">Exit</span>
  </div>
  <div id="fs-iframe-container">
    <iframe id="game-frame-fs" src="about:blank" allowfullscreen></iframe>

    <!-- LANDSCAPE ROTATION OVERLAY -->
    <div id="landscape-overlay">
      <!--
        SVG animation: phone rotates portrait→landscape in loop.
        Two curved arrows animate to suggest rotation.
        All white on black, clean style.
      -->
      <svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Phone group rotates: 0deg (portrait) → 90deg (landscape) → hold → back -->
          <animateTransform
            id="phoneRotAnim"
            attributeName="transform"
            type="rotate"
            values="0 80 80; 0 80 80; 90 80 80; 90 80 80; 0 80 80"
            keyTimes="0; 0.25; 0.6; 0.8; 1"
            dur="2.6s"
            repeatCount="indefinite"
            calcMode="spline"
            keySplines="0 0 1 1; 0.4 0 0.2 1; 0 0 1 1; 0.4 0 0.2 1"
          />
        </defs>

        <!-- Rotating phone group -->
        <g>
          <animateTransform
            attributeName="transform"
            type="rotate"
            values="0 80 80; 0 80 80; 90 80 80; 90 80 80; 0 80 80"
            keyTimes="0; 0.25; 0.6; 0.8; 1"
            dur="2.6s"
            repeatCount="indefinite"
            calcMode="spline"
            keySplines="0 0 1 1; 0.4 0 0.2 1; 0 0 1 1; 0.4 0 0.2 1"
          />
          <!-- Phone body -->
          <rect x="62" y="38" width="36" height="64" rx="6" ry="6"
                stroke="white" stroke-width="3" fill="none"/>
          <!-- Speaker slot -->
          <rect x="73" y="44" width="14" height="3" rx="1.5" fill="white" opacity="0.7"/>
          <!-- Home button -->
          <circle cx="80" cy="93" r="4" stroke="white" stroke-width="2.2" fill="none"/>
        </g>

        <!-- Arrow LEFT (counter-clockwise top arc) -->
        <!-- Fades/moves in first half, then out -->
        <g>
          <!-- arc going counter-clockwise top-left -->
          <path d="M 52 62 A 32 32 0 0 1 80 44" 
                stroke="white" stroke-width="3" stroke-linecap="round" fill="none">
            <animate attributeName="stroke-dasharray" values="0 60; 60 0; 60 0; 0 60; 0 60"
              keyTimes="0; 0.22; 0.5; 0.72; 1"
              dur="2.6s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0; 1; 1; 0; 0"
              keyTimes="0; 0.1; 0.5; 0.65; 1"
              dur="2.6s" repeatCount="indefinite"/>
          </path>
          <!-- arrowhead at start of arc (pointing down-left) -->
          <polyline points="46,67 52,62 57,68"
                    stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <animate attributeName="opacity" values="0; 1; 1; 0; 0"
              keyTimes="0; 0.1; 0.5; 0.65; 1"
              dur="2.6s" repeatCount="indefinite"/>
          </polyline>
        </g>

        <!-- Arrow RIGHT (clockwise bottom arc) -->
        <g>
          <path d="M 108 98 A 32 32 0 0 1 80 116"
                stroke="white" stroke-width="3" stroke-linecap="round" fill="none">
            <animate attributeName="stroke-dasharray" values="0 60; 60 0; 60 0; 0 60; 0 60"
              keyTimes="0; 0.22; 0.5; 0.72; 1"
              dur="2.6s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0; 1; 1; 0; 0"
              keyTimes="0; 0.1; 0.5; 0.65; 1"
              dur="2.6s" repeatCount="indefinite"/>
          </path>
          <!-- arrowhead at end of arc (pointing down-left along arc) -->
          <polyline points="74,111 80,116 80,109"
                    stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <animate attributeName="opacity" values="0; 1; 1; 0; 0"
              keyTimes="0; 0.1; 0.5; 0.65; 1"
              dur="2.6s" repeatCount="indefinite"/>
          </polyline>
        </g>
      </svg>
    </div>

  </div>
</div>

<header>
  <a class="back-btn" id="back-btn" href="/">← Home</a>
  <span class="site-name">CribestGames</span>
  <span style="width:60px"></span>
</header>

<h1 id="game-title">Loading…</h1>

<div class="game-preview" id="game-preview">
  <img id="game-thumb" alt="" style="display:none">
  <button class="play-btn" id="play-btn">▶</button>
</div>

<p class="description" id="game-desc"></p>

<div class="more-games">
  <div class="more-games-title" id="more-games-title">Other games</div>
  <div class="more-games-grid" id="suggested-games"></div>
</div>

<p class="error-msg" id="error-msg"></p>

<div class="license">Copyright © 2025-2026 cribest7890</div>

<script>
  const params  = new URLSearchParams(window.location.search);
  const gameKey = params.get('game');

  var rawLang = navigator.language || 'en';
  var lang = rawLang.startsWith('it') ? 'it' : rawLang.startsWith('uk') ? 'uk' : 'en';

  document.getElementById('back-btn').href = '/' + lang + '/';

  var exitLabels = { en: 'Exit', it: 'Esci', uk: 'Вийти' };
  document.getElementById('fs-exit-label').textContent = exitLabels[lang] || 'Exit';

  let gameIframe = '';
  let gameLandscape = false; // read from JSON

  const suggestedGames = [
    'ball-clicker',
    'logo-dvd',
    'tower-ability',
    'delicate-flower',
    '2048',
    'minesweeper',
    'tic-tac-toe',
    'rocket-goal',
    'poxel',
    'paper-io'
  ];

  const localizedGameNames = {
    en: {
      'ball-clicker': 'ball clicker',
      'logo-dvd': 'DVD screensaver',
      'tower-ability': 'tower ability',
      'delicate-flower': 'delicate flower',
      '2048': '2048',
      'minesweeper': 'minesweeper',
      'tic-tac-toe': 'tic-tac-toe',
      'rocket-goal': 'rocket-goal',
      'poxel': 'poxel',
      'paper-io': 'paper-io'
    },
    it: {
      'ball-clicker': 'ball clicker',
      'logo-dvd': 'DVD screensaver',
      'tower-ability': "torre dell'abilità",
      'delicate-flower': 'fiore delicato',
      '2048': '2048',
      'minesweeper': 'Campo minato',
      'tic-tac-toe': 'tris',
      'rocket-goal': 'rocket-goal',
      'poxel': 'poxel',
      'paper-io': 'paper-io'
    },
    uk: {
      'ball-clicker': 'ball clicker',
      'logo-dvd': 'DVD screensaver',
      'tower-ability': 'вежа здібностей',
      'delicate-flower': 'ніжна квітка',
      '2048': '2048',
      'minesweeper': 'тральщик',
      'tic-tac-toe': 'хрестики-нулики',
      'rocket-goal': 'rocket-goal',
      'poxel': 'poxel',
      'paper-io': 'paper-io'
    }
  };

  const suggestionsLabel = { en: 'Other games', it: 'Altri giochi', uk: 'Інші ігри' };
  document.getElementById('more-games-title').textContent = suggestionsLabel[lang] || suggestionsLabel.en;

  async function renderSuggestionList() {
    const grid = document.getElementById('suggested-games');
    const keys = suggestedGames.filter(key => key !== gameKey);
    shuffle(keys);

    for (const key of keys) {
      let title = localizedGameNames[lang][key] || localizedGameNames.en[key];

      try {
        const response = await fetch('/data/' + lang + '/' + key + '.json');
        if (response.ok) {
          const data = await response.json();
          title = data.title || title;
        }
      } catch (error) {
        // keep fallback title
      }

      const link = document.createElement('a');
      link.className = 'more-game-item';
      link.href = '/games?game=' + key;
      link.innerHTML = `
        <img src="/assets/${key}/logo.png" alt="${title}">
        <span>${title}</span>
      `;
      grid.appendChild(link);
    }
  }

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  if (gameKey) {
    fetch('/data/' + lang + '/' + gameKey + '.json')
      .then(res => res.json())
      .then(data => {
        gameIframe = data.iframe;
        gameLandscape = data.landscape === true;
        document.getElementById('game-title').textContent = data.title;
        document.getElementById('game-desc').textContent = data.description;

        const thumb = document.getElementById('game-thumb');
        thumb.src = '/assets/' + gameKey + '/logo.png';
        thumb.style.display = 'block';
      })
      .finally(renderSuggestionList);
  } else {
    renderSuggestionList();
  }

  const fakeFs   = document.getElementById('fake-fs');
  const frameFs  = document.getElementById('game-frame-fs');
  const preview  = document.getElementById('game-preview');
  const sidebar  = document.getElementById('fs-sidebar');
  const landscapeOverlay = document.getElementById('landscape-overlay');

  const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

  /* ── LANDSCAPE OVERLAY LOGIC ── */
  function isPortrait() {
    return window.innerHeight > window.innerWidth;
  }

  function updateLandscapeOverlay() {
    if (!gameLandscape) return;
    if (!fakeFs.classList.contains('active')) return;

    if (isPortrait()) {
      landscapeOverlay.classList.add('visible');
    } else {
      landscapeOverlay.classList.remove('visible');
    }
  }

  /* ── FAKE FULLSCREEN (mobile) ── */
  function enterFakeFS() {
    fakeFs.classList.add('active');
    document.body.style.overflow = 'hidden';
    updateLandscapeOverlay();
  }

  function exitFakeFS() {
    fakeFs.classList.remove('active');
    document.body.style.overflow = '';
    preview.style.display = '';
    landscapeOverlay.classList.remove('visible');
  }

  /* ── NATIVE FULLSCREEN (desktop) ── */
  function enterNativeFS() {
    const req = fakeFs.requestFullscreen
      ? fakeFs.requestFullscreen()
      : fakeFs.webkitRequestFullscreen
        ? fakeFs.webkitRequestFullscreen()
        : Promise.resolve();
    req.catch(() => {});
  }

  function exitNativeFS() {
    if (document.fullscreenElement || document.webkitFullscreenElement) {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    }
  }

  document.addEventListener('fullscreenchange', () => {
    if (!isMobile && !document.fullscreenElement) {
      exitFakeFS();
    }
  });
  document.addEventListener('webkitfullscreenchange', () => {
    if (!isMobile && !document.webkitFullscreenElement) {
      exitFakeFS();
    }
  });

  /* ── Orientation / resize listeners for landscape overlay ── */
  window.addEventListener('resize', updateLandscapeOverlay);
  window.addEventListener('orientationchange', function() {
    // small delay to let dimensions settle after rotation
    setTimeout(updateLandscapeOverlay, 120);
  });

  /* ── tasto Exit ── */
  sidebar.addEventListener('click', () => {
    if (isMobile) {
      exitFakeFS();
    } else {
      exitNativeFS();
    }
  });

  /* ── Play button ── */
  let gameStarted = false;

  document.getElementById('play-btn').addEventListener('click', () => {
    if (!gameIframe) return;
    if (!gameStarted) {
      frameFs.src = gameIframe;
      gameStarted = true;
    }
    preview.style.display = 'none';
    if (isMobile) {
      enterFakeFS();
    } else {
      enterFakeFS();
      enterNativeFS();
    }
  });

  fakeFs.addEventListener('touchmove', function(e) {
    e.preventDefault();
  }, { passive: false });
</script>

</body>
</html>
