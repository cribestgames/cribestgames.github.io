# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write # Permette la creazione e scrittura della sitemap nel repository
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate XML Sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          # Inseriamo l'URL completo con lo slash finale per evitare il taglio del dominio
          base-url-path: https://github.io
          # Esclude i file interni, la pagina 404 e i file di testo che generavano tag vuoti
          exclude-paths: "/.github/ /CNAME /README.md /LICENSE /404.html"
          # Rimuove gli spazi bianchi e le righe vuote superflue dal file XML finale
          xml-minify: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository (ora include sitemap.xml pulita e con URL corretti)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
