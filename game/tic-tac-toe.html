<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Tic Tac Toe</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
    text-align:center;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:20px;
}

.cell{
    background:#1e293b;
    aspect-ratio:1;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    cursor:pointer;
    user-select:none;
    transition:0.2s;
}

.cell:hover{
    background:#334155;
}

button,input,select{
    padding:10px;
    border:none;
    border-radius:10px;
    margin:5px;
    font-size:16px;
}

button{
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

input{
    width:100%;
    box-sizing:border-box;
    background:#1e293b;
    color:white;
}

#status{
    margin-top:15px;
    color:#94a3b8;
    font-size:18px;
}

#onlinePanel{
    margin-top:15px;
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Tic Tac Toe</h1>

<select id="mode">
    <option value="local">Local</option>
    <option value="bot">Bot</option>
    <option value="online">Online</option>
</select>

<button onclick="resetGame()">
    Reset
</button>

<!-- ONLINE -->

<div id="onlinePanel" class="hidden">

    <input
        id="roomInput"
        placeholder="Nome stanza"
    />

    <button onclick="hostRoom()">
        Crea stanza
    </button>

    <button onclick="joinRoom()">
        Entra
    </button>

</div>

<div id="status">
    Player X turn
</div>

<div class="board" id="board"></div>

</div>

<script>

// =====================================================
// GAME
// =====================================================

let board = Array(9).fill("");

let turn = "X";

let over = false;

let myRole = null;

const wins = [
    [0,1,2],
    [3,4,5],
    [6,7,8],
    [0,3,6],
    [1,4,7],
    [2,5,8],
    [0,4,8],
    [2,4,6]
];

const boardEl =
    document.getElementById("board");

const statusEl =
    document.getElementById("status");

const modeEl =
    document.getElementById("mode");

const onlinePanel =
    document.getElementById("onlinePanel");

// =====================================================
// PEERJS
// =====================================================

let peer = null;

let conn = null;

// =====================================================
// MODE
// =====================================================

modeEl.onchange = ()=>{

    onlinePanel.classList.toggle(
        "hidden",
        modeEl.value !== "online"
    );

    resetGame();
};

// =====================================================
// DRAW
// =====================================================

function drawBoard(){

    boardEl.innerHTML = "";

    board.forEach((value,index)=>{

        const cell =
            document.createElement("div");

        cell.className = "cell";

        cell.innerText = value;

        cell.onclick = ()=>move(index);

        boardEl.appendChild(cell);
    });
}

drawBoard();

// =====================================================
// MOVE
// =====================================================

function move(index){

    console.log({
        turn,
        myRole,
        over
    });

    if(over) return;

    if(board[index]) return;

    // ONLINE

    if(modeEl.value === "online"){

        if(!conn || !conn.open){

            statusEl.innerText =
                "Non connesso";

            return;
        }

        if(turn !== myRole){

            statusEl.innerText =
                "Turno di " + turn;

            return;
        }
    }

    board[index] = turn;

    drawBoard();

    sendMove(index, board[index]);

    if(checkWinner(turn)){

        statusEl.innerText =
            turn + " wins!";

        over = true;

        return;
    }

    if(board.every(v=>v)){

        statusEl.innerText =
            "Draw!";

        over = true;

        return;
    }

    turn =
        turn === "X"
            ? "O"
            : "X";

    statusEl.innerText =
        "Player " + turn + " turn";

    // BOT

    if(modeEl.value === "bot" && turn === "O"){

        setTimeout(botMove,400);
    }
}

// =====================================================
// CHECK WIN
// =====================================================

function checkWinner(player){

    return wins.some(combo =>
        combo.every(i => board[i] === player)
    );
}

// =====================================================
// BOT
// =====================================================

function botMove(){

    const free = board
        .map((v,i)=>v ? null : i)
        .filter(v=>v!==null);

    move(
        free[Math.random()*free.length|0]
    );
}

// =====================================================
// RESET
// =====================================================

function resetGame(){

    board = Array(9).fill("");

    turn = "X";

    over = false;

    drawBoard();

    statusEl.innerText =
        "Player X turn";

    if(conn && conn.open){

        conn.send({
            type:"reset"
        });
    }
}

// =====================================================
// HOST ROOM
// =====================================================

function hostRoom(){

    let roomId =
        document
        .getElementById("roomInput")
        .value
        .trim()
        .toLowerCase();

    if(!roomId) return;

    roomId =
        roomId.replace(/[^a-z0-9]/g,"");

    if(peer){

        peer.destroy();
    }

    myRole = "X";

    peer = new Peer(
        "room-" + roomId,
        {
            host:"0.peerjs.com",
            port:443,
            secure:true,
            debug:2
        }
    );

    peer.on("open",(id)=>{

        console.log("HOST:",id);

        statusEl.innerText =
            "Stanza creata: " + roomId;
    });

    peer.on("connection",(connection)=>{

        conn = connection;

        turn = "X";

        setupConnection();

        statusEl.innerText =
            "Giocatore connesso!";
    });

    peer.on("error",(err)=>{

        console.log(err);

        alert(
            "Errore host: " +
            err.type
        );
    });
}

// =====================================================
// JOIN ROOM
// =====================================================

function joinRoom(){

    let roomId =
        document
        .getElementById("roomInput")
        .value
        .trim()
        .toLowerCase();

    if(!roomId) return;

    roomId =
        roomId.replace(/[^a-z0-9]/g,"");

    if(peer){

        peer.destroy();
    }

    myRole = "O";

    statusEl.innerText =
        "Connessione...";

    peer = new Peer({

        host:"0.peerjs.com",
        port:443,
        secure:true,
        debug:2
    });

    peer.on("open",()=>{

        console.log("PEER OPEN");

        conn = peer.connect(
            "room-" + roomId,
            {
                reliable:true
            }
        );

        conn.on("open",()=>{

            console.log("DATA OPEN");

            turn = "X";

            setupConnection();

            statusEl.innerText =
                "Connesso! Sei O";

            // IMPORTANTISSIMO
            // forza sync iniziale

            conn.send({
                type:"syncRequest"
            });
        });

        conn.on("data",(data)=>{

            console.log(data);
        });

        conn.on("error",(err)=>{

            console.log(err);

            statusEl.innerText =
                "Errore connessione";
        });

    });

    peer.on("error",(err)=>{

        console.log(err);

        statusEl.innerText =
            "Errore PeerJS";
    });
}

// =====================================================
// CONNECTION
// =====================================================

function setupConnection(){
    if(data.type === "syncRequest"){

    conn.send({
        type:"syncState",
        board,
        turn,
        over
    });

    return;
}

if(data.type === "syncState"){

    board = data.board;

    turn = data.turn;

    over = data.over;

    drawBoard();

    return;
}

    conn.on("data",(data)=>{

        console.log("RECV:",data);

        // RESET

        if(data.type === "reset"){

            board = Array(9).fill("");

            turn = "X";

            over = false;

            drawBoard();

            statusEl.innerText =
                "Nuova partita";

            return;
        }

        // MOVE

        if(data.type === "move"){

            board[data.i] = data.p;

            drawBoard();

            if(checkWinner(data.p)){

                statusEl.innerText =
                    data.p + " wins!";

                over = true;

                return;
            }

            if(board.every(v=>v)){

                statusEl.innerText =
                    "Draw!";

                over = true;

                return;
            }

            turn =
                data.p === "X"
                    ? "O"
                    : "X";

            statusEl.innerText =
                "Player " + turn + " turn";
        }
    });

    conn.on("close",()=>{

        statusEl.innerText =
            "Connessione chiusa";
    });
}

// =====================================================
// SEND MOVE
// =====================================================

function sendMove(i,p){

    if(conn && conn.open){

        conn.send({
            type:"move",
            i,
            p
        });
    }
}

</script>

</body>
</html>
