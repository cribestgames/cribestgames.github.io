<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Tic Tac Toe</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
    text-align:center;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:20px;
}

.cell{
    background:#1e293b;
    aspect-ratio:1;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    cursor:pointer;
    border-radius:12px;
    user-select:none;
}

button, select{
    padding:10px;
    border-radius:10px;
    border:none;
    margin:5px;
    font-size:16px;
}

button{
    background:#2563eb;
    color:white;
    cursor:pointer;
}

canvas{
    margin-top:10px;
    max-width:100%;
}

#reader,
#reader2{
    margin-top:15px;
}

#info{
    margin-top:15px;
    font-size:18px;
}

#p2pHint{
    margin-top:10px;
    color:#94a3b8;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>Tic Tac Toe</h1>

<select id="mode">
  <option value="friend">Local</option>
  <option value="bot">Bot</option>
  <option value="p2p">Online (QR code)</option>
</select>

<button onclick="resetGame()">Reset</button>

<div class="board" id="board"></div>

<div id="info">Player X turn</div>

<div id="p2p" style="display:none;">

    <button onclick="createRoom()">Create Room</button>
    <button onclick="startScan()">Scan QR</button>

    <div>
        <canvas id="qr"></canvas>
    </div>

    <div>
        <canvas id="qrAnswer" style="display:none"></canvas>
    </div>

    <div id="p2pHint"></div>

    <div id="reader"></div>
    <div id="reader2"></div>

</div>

</div>

<script>

// ======================================
// GAME
// ======================================

let board = Array(9).fill("");
let turn = "X";
let over = false;
let myRole = null;

const wins = [
  [0,1,2],
  [3,4,5],
  [6,7,8],
  [0,3,6],
  [1,4,7],
  [2,5,8],
  [0,4,8],
  [2,4,6]
];

const elBoard = document.getElementById("board");
const info = document.getElementById("info");
const mode = document.getElementById("mode");
const p2pDiv = document.getElementById("p2p");
const hint = document.getElementById("p2pHint");

mode.onchange = () => {
    p2pDiv.style.display =
        mode.value === "p2p"
            ? "block"
            : "none";

    resetGame();
};

function drawBoard(){

    elBoard.innerHTML = "";

    board.forEach((value,index)=>{

        const cell = document.createElement("div");

        cell.className = "cell";
        cell.innerText = value;

        cell.onclick = ()=>makeMove(index);

        elBoard.appendChild(cell);

    });

}

function makeMove(index){

    if(over) return;
    if(board[index]) return;

    if(mode.value === "p2p"){

        if(!dc || dc.readyState !== "open")
            return;

        if(turn !== myRole)
            return;
    }

    board[index] = turn;

    drawBoard();

    if(checkWinner(turn)){

        info.innerText = turn + " wins!";
        over = true;

        sendMove(index, board[index]);

        return;
    }

    if(board.every(v=>v)){

        info.innerText = "Draw!";
        over = true;

        sendMove(index, board[index]);

        return;
    }

    turn = turn === "X"
        ? "O"
        : "X";

    info.innerText = "Player " + turn + " turn";

    if(mode.value === "bot" && turn === "O"){

        setTimeout(botMove,400);

    }

    sendMove(index, board[index]);
}

function checkWinner(player){

    return wins.some(combo =>
        combo.every(i => board[i] === player)
    );
}

function botMove(){

    for(let i=0;i<9;i++){

        if(!board[i]){

            board[i] = "O";

            if(checkWinner("O")){

                board[i] = "";
                makeMove(i);
                return;
            }

            board[i] = "";
        }
    }

    for(let i=0;i<9;i++){

        if(!board[i]){

            board[i] = "X";

            if(checkWinner("X")){

                board[i] = "";
                makeMove(i);
                return;
            }

            board[i] = "";
        }
    }

    const free = board
        .map((v,i)=>v ? null : i)
        .filter(v=>v!==null);

    makeMove(
        free[Math.random() * free.length | 0]
    );
}

function resetGame(){

    board = Array(9).fill("");

    turn = "X";
    over = false;

    info.innerText = "Player X turn";

    drawBoard();
}

drawBoard();

// ======================================
// P2P WEBRTC
// ======================================

let peer;
let dc;
let isHost = false;

const scanners = {};

const cfg = {
    iceServers:[
        {
            urls:"stun:stun.l.google.com:19302"
        }
    ]
};

// ======================================
// COMPRESSION
// ======================================

function compress(str){

    return btoa(
        unescape(
            encodeURIComponent(str)
        )
    );
}

function decompress(str){

    return decodeURIComponent(
        escape(
            atob(str)
        )
    );
}

// ======================================
// SMALL SDP
// ======================================

function minimalSDP(sdp){

    return sdp
        .split("\n")
        .filter(line =>

            line.startsWith("v=") ||
            line.startsWith("o=") ||
            line.startsWith("s=") ||
            line.startsWith("t=") ||
            line.startsWith("a=group") ||
            line.startsWith("m=") ||
            line.startsWith("c=") ||
            line.startsWith("a=mid") ||
            line.startsWith("a=sendrecv") ||
            line.startsWith("a=ice-ufrag") ||
            line.startsWith("a=ice-pwd") ||
            line.startsWith("a=fingerprint") ||
            line.startsWith("a=setup") ||
            line.startsWith("a=sctp-port") ||
            line.startsWith("a=max-message-size") ||
            line.startsWith("a=candidate:")
        )
        .join("\n");
}

// ======================================
// ENCODE / DECODE
// ======================================

function encode(desc){

    return compress(
        JSON.stringify({
            t: desc.type[0],
            s: minimalSDP(desc.sdp)
        })
    );
}

function decode(str){

    const obj = JSON.parse(
        decompress(str)
    );

    return {
        type:
            obj.t === "o"
                ? "offer"
                : "answer",

        sdp: obj.s
    };
}

// ======================================
// QR
// ======================================

async function showQR(canvasId, text){

    const canvas = document.getElementById(canvasId);

    canvas.style.display = "block";

    await QRCode.toCanvas(canvas, text, {
        width: 380,
        margin: 2,
        errorCorrectionLevel: "M"
    });

    console.log("QR length:", text.length);
}

// ======================================
// HOST
// ======================================

async function createRoom(){

    isHost = true;
    myRole = "X";

    peer = new RTCPeerConnection(cfg);

    dc = peer.createDataChannel("game");

    setupDC(dc);

    peer.onicegatheringstatechange = async ()=>{

        if(peer.iceGatheringState !== "complete")
            return;

        const encoded = encode({
            type:"offer",
            sdp:peer.localDescription.sdp
        });

        await showQR("qr", encoded);

        hint.innerText =
            "1) Fai scansionare questo QR all'amico\n" +
            "2) Poi premi Scan QR per leggere il suo";

        info.innerText =
            "Aspetta l'altro giocatore...";
    };

    const offer = await peer.createOffer();

    await peer.setLocalDescription(offer);
}

// ======================================
// START SCAN
// ======================================

async function startScan(){

    if(isHost && peer){

        runScan("reader2","answer");

    }else{

        runScan("reader","offer");
    }
}

// ======================================
// SCANNER
// ======================================

async function runScan(readerId, expected){

    document.getElementById(readerId).innerHTML = "";

    const scanner = new Html5QrcodeScanner(
        readerId,
        {
            fps: 5,
            qrbox: 250,
            rememberLastUsedCamera: true,
            supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
        },
        false
    );

    scanner.render(async (text)=>{

        try{

            const desc = decode(text);

            if(desc.type !== expected)
                return;

            await scanner.clear();

            // ================= GUEST =================

            if(expected === "offer"){

                myRole = "O";

                peer = new RTCPeerConnection(cfg);

                peer.ondatachannel = e => {
                    setupDC(e.channel);
                };

                peer.onicegatheringstatechange = async ()=>{

                    if(peer.iceGatheringState !== "complete")
                        return;

                    const encoded = encode({
                        type:"answer",
                        sdp:peer.localDescription.sdp
                    });

                    await showQR("qrAnswer", encoded);

                    hint.innerText =
                        "Mostra questo QR all'host";

                    info.innerText =
                        "Aspetta connessione...";
                };

                await peer.setRemoteDescription(
                    new RTCSessionDescription(desc)
                );

                const answer = await peer.createAnswer();

                await peer.setLocalDescription(answer);

            }else{

                // ================= HOST =================

                await peer.setRemoteDescription(
                    new RTCSessionDescription(desc)
                );

                info.innerText = "Connessione...";
            }

        }catch(err){

            console.log(err);

        }

    });
}

// ======================================
// DATA CHANNEL
// ======================================

function setupDC(channel){

    dc = channel;

    dc.onopen = ()=>{

        info.innerText =
            "Connessi! Sei " + myRole;

        hint.innerText = "";
    };

    dc.onmessage = e => {

        const msg = JSON.parse(e.data);

        if(msg.type === "move"){

            board[msg.i] = msg.p;

            drawBoard();

            if(checkWinner(msg.p)){

                info.innerText =
                    msg.p + " wins!";

                over = true;

                return;
            }

            if(board.every(v=>v)){

                info.innerText = "Draw!";

                over = true;

                return;
            }

            turn =
                msg.p === "X"
                    ? "O"
                    : "X";

            info.innerText =
                "Player " + turn + " turn";
        }
    };
}

// ======================================
// SEND MOVE
// ======================================

function sendMove(i,p){

    if(dc && dc.readyState === "open"){

        dc.send(
            JSON.stringify({
                type:"move",
                i,
                p
            })
        );
    }
}

</script>

</body>
</html>
