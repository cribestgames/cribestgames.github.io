<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Tic Tac Toe</title>

<script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
    text-align:center;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:20px;
}

.cell{
    background:#1e293b;
    aspect-ratio:1;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    cursor:pointer;
    user-select:none;
    transition:0.2s;
}

.cell:hover{
    background:#334155;
}

button,input,select{
    padding:10px;
    border:none;
    border-radius:10px;
    margin:5px;
    font-size:16px;
}

button{
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

input{
    width:100%;
    box-sizing:border-box;
    background:#1e293b;
    color:white;
}

#status{
    margin-top:15px;
    color:#94a3b8;
    font-size:18px;
}

#onlinePanel{
    margin-top:15px;
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Tic Tac Toe</h1>

<select id="mode">
    <option value="local">Local</option>
    <option value="bot">Bot</option>
    <option value="online">Online</option>
</select>

<button onclick="resetGame()">
    Reset
</button>

<div id="onlinePanel" class="hidden">

    <input
        id="roomInput"
        placeholder="Room name"
    />

    <button onclick="hostRoom()">
        Create room
    </button>

    <button onclick="joinRoom()">
        Enter
    </button>

</div>

<div id="status">
    Player X turn
</div>

<div class="board" id="board"></div>

</div>

<script>

// =====================================================
// GAME
// =====================================================

let board = Array(9).fill("");

let turn = "X";

// alterna chi inizia
let startingPlayer = "X";

let over = false;

let myRole = null;

let botThinking = false;

const wins = [
    [0,1,2],
    [3,4,5],
    [6,7,8],
    [0,3,6],
    [1,4,7],
    [2,5,8],
    [0,4,8],
    [2,4,6]
];

const boardEl =
    document.getElementById("board");

const statusEl =
    document.getElementById("status");

const modeEl =
    document.getElementById("mode");

const onlinePanel =
    document.getElementById("onlinePanel");

// =====================================================
// PEERJS
// =====================================================

let peer = null;

let conn = null;

// =====================================================
// MODE
// =====================================================

modeEl.onchange = ()=>{

    onlinePanel.classList.toggle(
        "hidden",
        modeEl.value !== "online"
    );

    resetGame();
};

// =====================================================
// DRAW
// =====================================================

function drawBoard(){

    boardEl.innerHTML = "";

    board.forEach((value,index)=>{

        const cell =
            document.createElement("div");

        cell.className = "cell";

        cell.innerText = value;

        cell.onclick = ()=>move(index);

        boardEl.appendChild(cell);
    });
}

drawBoard();

// =====================================================
// MOVE
// =====================================================

function move(index,isBot=false){

    console.log({
        turn,
        myRole,
        over,
        conn,
        open: conn?.open
    });

    if(over) return;

    if(board[index]) return;

    if(
    modeEl.value === "bot" &&
    turn === "O" &&
    !isBot
){
    return;
    }

    // ONLINE

    if(modeEl.value === "online"){

        if(!conn || !conn.open){

            statusEl.innerText =
                "Not connected";

            return;
        }

        if(turn !== myRole){

            statusEl.innerText =
                 "Player " + turn + " turn";

            return;
        }
    }

    board[index] = turn;

    drawBoard();

    sendMove(index, board[index]);

    if(checkWinner(turn)){

        statusEl.innerText =
            turn + " wins!";

        over = true;

        return;
    }

    if(board.every(v=>v)){

        statusEl.innerText =
            "Draw!";

        over = true;

        return;
    }

    turn =
        turn === "X"
            ? "O"
            : "X";

    statusEl.innerText =
        "Player " + turn + " turn";

    // BOT

    if(modeEl.value === "bot" && turn === "O"){

    botThinking = true;

    setTimeout(()=>{

        botMove();

        botThinking = false;

    },500 + Math.random()*1500);
    }
}

// =====================================================
// CHECK WIN
// =====================================================

function checkWinner(player){

    return wins.some(combo =>
        combo.every(i => board[i] === player)
    );
}

// =====================================================
// BOT
// =====================================================

function botMove(){

    // 1. Vincere
    let moveIndex = findWinningMove("O");
    if(moveIndex !== null){
        move(moveIndex,true);
        return;
    }

    // 2. Bloccare
    moveIndex = findWinningMove("X");
    if(moveIndex !== null){
        move(moveIndex,true);
        return;
    }

    // 3. Centro (90% delle volte)
    if(board[4] === "" && Math.random() < 0.9){
        move(4,true);
        return;
    }

    // 4. Angoli
    const corners = [0,2,6,8]
        .filter(i => board[i] === "");

    if(corners.length){

        move(
            corners[
                Math.floor(Math.random()*corners.length)
            ]
        ,true);

        return;
    }

    // 5. Lati
    const sides = [1,3,5,7]
        .filter(i => board[i] === "");

    if(sides.length){

        move(
            sides[
                Math.floor(Math.random()*sides.length)
            ]
        ,true);

        return;
    }
}

function findWinningMove(player){

    for(const combo of wins){

        const marks =
            combo.filter(i => board[i] === player).length;

        const empty =
            combo.filter(i => board[i] === "").length;

        if(marks === 2 && empty === 1){

            return combo.find(i => board[i] === "");
        }
    }

    return null;
                              }

// =====================================================
// RESET
// =====================================================

function resetGame(){

    // alterna chi inizia
    startingPlayer =
        startingPlayer === "X"
            ? "O"
            : "X";

    board = Array(9).fill("");

    turn = startingPlayer;

    over = false;

    drawBoard();

    statusEl.innerText =
        "Player " + turn + " turn";

    if(conn && conn.open){

        conn.send({
            type:"reset",
            starter: startingPlayer
        });
    }

    // bot inizia
    if(modeEl.value === "bot" && turn === "O"){

    botThinking = true;

    setTimeout(()=>{

        botMove();

        botThinking = false;

    },500 + Math.random()*1500);
    }
}

// =====================================================
// ICE SERVERS
// =====================================================

const peerConfig = {

    config:{
        iceServers:[

            {
                urls:[
                    "stun:stun.l.google.com:19302",
                    "stun:global.stun.twilio.com:3478"
                ]
            }

        ]
    },

    debug:2
};

// =====================================================
// HOST ROOM
// =====================================================

function hostRoom(){

    let roomId =
        document
        .getElementById("roomInput")
        .value
        .trim()
        .toLowerCase();

    if(!roomId) return;

    roomId =
        roomId.replace(/[^a-z0-9]/g,"");

    if(peer){

        peer.destroy();
    }

    myRole = "X";

    peer = new Peer(
        "room-" + roomId,
        peerConfig
    );

    peer.on("open",(id)=>{

        console.log("HOST OPEN:",id);

        statusEl.innerText =
            "Room created";
    });

    peer.on("connection",(connection)=>{

        console.log("PLAYER CONNECTING");

        conn = connection;

        setupConnection();

        conn.on("open",()=>{

            console.log(
                "HOST CONNECTION OPEN"
            );

            statusEl.innerText =
                "Player connected";
        });

        conn.on("close",()=>{

            console.log(
                "HOST CONNECTION CLOSED"
            );

            statusEl.innerText =
                "Connessione chiusa";
        });

        conn.on("error",(err)=>{

            console.log(
                "HOST CONNECTION ERROR:",
                err
            );

            statusEl.innerText =
                "Connection error";
        });
    });

    peer.on("error",(err)=>{

        console.log("HOST ERROR:", err);

        statusEl.innerText =
            "Host error";
    });
}

// =====================================================
// JOIN ROOM
// =====================================================

function joinRoom(){

    let roomId =
        document
        .getElementById("roomInput")
        .value
        .trim()
        .toLowerCase();

    if(!roomId) return;

    roomId =
        roomId.replace(/[^a-z0-9]/g,"");

    if(peer){

        peer.destroy();
    }

    myRole = "O";

    statusEl.innerText =
        "Connecting...";

    peer = new Peer(peerConfig);

    peer.on("open",(id)=>{

        console.log("CLIENT OPEN:",id);

        conn = peer.connect(
            "room-" + roomId,
            {
                serialization:"json"
            }
        );

        setupConnection();

        conn.on("open",()=>{

            console.log(
                "CLIENT CONNECTION OPEN"
            );

            statusEl.innerText =
                "Connected! You're O";

            conn.send({
                type:"syncRequest"
            });
        });

        conn.on("close",()=>{

            console.log(
                "CLIENT CONNECTION CLOSED"
            );

            statusEl.innerText =
                "Connection closed";
        });

        conn.on("error",(err)=>{

            console.log(
                "CLIENT CONNECTION ERROR:",
                err
            );

            statusEl.innerText =
                "connection error";
        });

    });

    peer.on("error",(err)=>{

        console.log("CLIENT ERROR:", err);

        statusEl.innerText =
            "PeerJS error";
    });
}

// =====================================================
// CONNECTION
// =====================================================

function setupConnection(){

    conn.on("data",(data)=>{

        console.log("RECV:",data);

        // =========================
        // SYNC REQUEST
        // =========================

        if(data.type === "syncRequest"){

            conn.send({
                type:"syncState",
                board,
                turn,
                over
            });

            return;
        }

        // =========================
        // SYNC STATE
        // =========================

        if(data.type === "syncState"){

            board = data.board;

            turn = data.turn;

            over = data.over;

            drawBoard();

            statusEl.innerText =
                "Player " + turn + " turn";

            return;
        }

        // =========================
        // RESET
        // =========================

        if(data.type === "reset"){

            board = Array(9).fill("");

            startingPlayer = data.starter;

            turn = startingPlayer;

            over = false;

            drawBoard();

            statusEl.innerText =
                "Player " + turn + " turn";

            // bot
            if(modeEl.value === "bot" && turn === "O"){

                setTimeout(botMove,400);
            }

            return;
        }

        // =========================
        // MOVE
        // =========================

        if(data.type === "move"){

            board[data.i] = data.p;

            drawBoard();

            if(checkWinner(data.p)){

                statusEl.innerText =
                    data.p + " wins!";

                over = true;

                return;
            }

            if(board.every(v=>v)){

                statusEl.innerText =
                    "Draw!";

                over = true;

                return;
            }

            turn =
                data.p === "X"
                    ? "O"
                    : "X";

            statusEl.innerText =
                "Player " + turn + " turn";
        }
    });
}

// =====================================================
// SEND MOVE
// =====================================================

function sendMove(i,p){

    if(conn && conn.open){

        conn.send({
            type:"move",
            i,
            p
        });
    }
}

</script>

</body>
</html>
