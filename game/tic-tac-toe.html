<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Tic Tac Toe</title>

<!-- QR -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<!-- Compression -->
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
    text-align:center;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:20px;
}

.cell{
    background:#1e293b;
    border-radius:12px;
    aspect-ratio:1;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    cursor:pointer;
    user-select:none;
}

button,select,textarea{
    padding:10px;
    border:none;
    border-radius:10px;
    font-size:16px;
    margin:5px;
}

button{
    background:#2563eb;
    color:white;
    cursor:pointer;
}

textarea{
    width:100%;
    min-height:120px;
    resize:vertical;
    box-sizing:border-box;
    background:#1e293b;
    color:white;
}

canvas{
    max-width:100%;
    margin-top:10px;
    background:white;
    border-radius:10px;
}

#info{
    margin-top:15px;
    font-size:18px;
}

#p2pHint{
    margin-top:10px;
    color:#94a3b8;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>Tic Tac Toe</h1>

<select id="mode">
    <option value="friend">Local</option>
    <option value="bot">Bot</option>
    <option value="p2p">Online (QR code)</option>
</select>

<button onclick="resetGame()">
    Reset
</button>

<div class="board" id="board"></div>

<div id="info">
    Player X turn
</div>

<div id="p2p" style="display:none;">

    <button onclick="createRoom()">
        Create Room
    </button>

    <canvas id="qr"></canvas>

    <canvas
        id="qrAnswer"
        style="display:none">
    </canvas>

    <div id="p2pHint"></div>

    <textarea
        id="signalData"
        placeholder="Incolla qui offer / answer">
    </textarea>

    <br>

    <button onclick="pasteSignal()">
        Connect
    </button>

</div>

</div>

<script>

// =====================================================
// GAME
// =====================================================

let board = Array(9).fill("");

let turn = "X";

let over = false;

let myRole = null;

const wins = [
    [0,1,2],
    [3,4,5],
    [6,7,8],
    [0,3,6],
    [1,4,7],
    [2,5,8],
    [0,4,8],
    [2,4,6]
];

const elBoard =
    document.getElementById("board");

const info =
    document.getElementById("info");

const mode =
    document.getElementById("mode");

const p2pDiv =
    document.getElementById("p2p");

const hint =
    document.getElementById("p2pHint");

mode.onchange = ()=>{

    p2pDiv.style.display =
        mode.value === "p2p"
            ? "block"
            : "none";

    resetGame();
};

function drawBoard(){

    elBoard.innerHTML = "";

    board.forEach((value,index)=>{

        const cell =
            document.createElement("div");

        cell.className = "cell";

        cell.innerText = value;

        cell.onclick = ()=>makeMove(index);

        elBoard.appendChild(cell);
    });
}

function makeMove(index){

    if(over) return;

    if(board[index]) return;

    if(mode.value === "p2p"){

        if(!dc || dc.readyState !== "open")
            return;

        if(turn !== myRole)
            return;
    }

    board[index] = turn;

    drawBoard();

    if(checkWinner(turn)){

        info.innerText =
            turn + " wins!";

        over = true;

        sendMove(index, board[index]);

        return;
    }

    if(board.every(v=>v)){

        info.innerText = "Draw!";

        over = true;

        sendMove(index, board[index]);

        return;
    }

    turn =
        turn === "X"
            ? "O"
            : "X";

    info.innerText =
        "Player " + turn + " turn";

    if(mode.value === "bot" && turn === "O"){

        setTimeout(botMove,400);
    }

    sendMove(index, board[index]);
}

function checkWinner(player){

    return wins.some(combo =>
        combo.every(i => board[i] === player)
    );
}

function botMove(){

    const free = board
        .map((v,i)=>v ? null : i)
        .filter(v=>v!==null);

    makeMove(
        free[Math.random()*free.length|0]
    );
}

function resetGame(){

    board = Array(9).fill("");

    turn = "X";

    over = false;

    info.innerText =
        "Player X turn";

    drawBoard();
}

drawBoard();

// =====================================================
// WEBRTC
// =====================================================

let peer;

let dc;

let isHost = false;

const rtcConfig = {
    iceServers:[
        {
            urls:"stun:stun.l.google.com:19302"
        }
    ]
};

// =====================================================
// ENCODE / DECODE
// =====================================================

function encode(desc){

    const tiny = JSON.stringify({
        t: desc.type,
        s: desc.sdp
    });

    return LZString
        .compressToEncodedURIComponent(tiny);
}

function decode(str){

    const json =
        LZString
        .decompressFromEncodedURIComponent(str);

    return JSON.parse(json);
}

// =====================================================
// QR
// =====================================================

async function showQR(canvasId,text){

    const canvas =
        document.getElementById(canvasId);

    canvas.style.display = "block";

    await QRCode.toCanvas(canvas,text,{
        width:500,
        margin:1,
        errorCorrectionLevel:"L"
    });

    console.log("chars:",text.length);
}

// =====================================================
// CREATE ROOM
// =====================================================

async function createRoom(){

    isHost = true;

    myRole = "X";

    peer =
        new RTCPeerConnection(rtcConfig);

    dc =
        peer.createDataChannel("game");

    setupDC(dc);

    peer.onconnectionstatechange = ()=>{

        info.innerText =
            "State: " +
            peer.connectionState;
    };

    peer.onicecandidate =
    async (event)=>{

        if(!event.candidate){

            const encoded = encode({
                type:"offer",
                sdp:peer.localDescription.sdp
            });

            document
                .getElementById("signalData")
                .value = encoded;

            await showQR("qr", encoded);

            info.innerText =
                "Invia offer";
        }
    };

    const offer =
        await peer.createOffer();

    await peer.setLocalDescription(offer);
}

// =====================================================
// PASTE SIGNAL
// =====================================================

async function pasteSignal(){

    try{

        const text =
            document
            .getElementById("signalData")
            .value
            .trim();

        if(!text) return;

        const desc = decode(text);

        // =============================================
        // GUEST
        // =============================================

        if(desc.t === "offer" || desc.type === "offer"){

            myRole = "O";

            peer =
                new RTCPeerConnection(rtcConfig);

            peer.onconnectionstatechange = ()=>{

                info.innerText =
                    "State: " +
                    peer.connectionState;
            };

            peer.ondatachannel = e => {

                setupDC(e.channel);
            };

            peer.onicecandidate =
            async (event)=>{

                if(!event.candidate){

                    const encoded = encode({
                        type:"answer",
                        sdp:peer.localDescription.sdp
                    });

                    document
                        .getElementById("signalData")
                        .value = encoded;

                    await showQR(
                        "qrAnswer",
                        encoded
                    );

                    info.innerText =
                        "Invia answer";
                }
            };

            await peer.setRemoteDescription(
                new RTCSessionDescription({
                    type:"offer",
                    sdp:desc.s
                })
            );

            const answer =
                await peer.createAnswer();

            await peer.setLocalDescription(answer);
        }

        // =============================================
        // HOST
        // =============================================

        else{

            await peer.setRemoteDescription(
                new RTCSessionDescription({
                    type:"answer",
                    sdp:desc.s
                })
            );

            info.innerText =
                "Connecting...";
        }

    }catch(err){

        console.log(err);

        alert("Errore connessione");
    }
}

// =====================================================
// DATA CHANNEL
// =====================================================

function setupDC(channel){

    dc = channel;

    dc.onopen = ()=>{

        info.innerText =
            "Connected! Sei " +
            myRole;

        hint.innerText = "";
    };

    dc.onmessage = e => {

        const msg =
            JSON.parse(e.data);

        if(msg.type === "move"){

            board[msg.i] = msg.p;

            drawBoard();

            if(checkWinner(msg.p)){

                info.innerText =
                    msg.p + " wins!";

                over = true;

                return;
            }

            if(board.every(v=>v)){

                info.innerText =
                    "Draw!";

                over = true;

                return;
            }

            turn =
                msg.p === "X"
                    ? "O"
                    : "X";

            info.innerText =
                "Player " + turn + " turn";
        }
    };
}

// =====================================================
// SEND MOVE
// =====================================================

function sendMove(i,p){

    if(dc && dc.readyState === "open"){

        dc.send(JSON.stringify({
            type:"move",
            i,
            p
        }));
    }
}

</script>

</body>
</html>
