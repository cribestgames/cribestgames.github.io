<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Tic Tac Toe</title>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:550px;
    text-align:center;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:20px;
}

.cell{
    background:#1e293b;
    border-radius:12px;
    aspect-ratio:1;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    cursor:pointer;
    user-select:none;
}

button,input,select{
    padding:10px;
    border:none;
    border-radius:10px;
    font-size:16px;
    margin:5px;
}

button{
    background:#2563eb;
    color:white;
    cursor:pointer;
}

input{
    width:100%;
    box-sizing:border-box;
    background:#1e293b;
    color:white;
}

.room{
    background:#1e293b;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

#status{
    margin-top:15px;
    color:#94a3b8;
    font-size:18px;
}

#rooms{
    margin-top:20px;
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Tic Tac Toe</h1>

<select id="mode">
    <option value="local">Local</option>
    <option value="bot">Bot</option>
    <option value="lan">LAN / Same WiFi</option>
</select>

<button onclick="resetGame()">
    Reset
</button>

<!-- LAN UI -->

<div id="lanPanel" class="hidden">

    <input
        id="roomInput"
        placeholder="Nome stanza"
    />

    <button onclick="createRoom()">
        Crea Stanza
    </button>

    <button onclick="loadRooms()">
        Aggiorna
    </button>

    <div id="rooms"></div>

</div>

<div id="status">
    Player X turn
</div>

<div class="board" id="board"></div>

</div>

<script>

// =====================================================
// GAME
// =====================================================

let board = Array(9).fill("");

let turn = "X";

let over = false;

const wins = [
    [0,1,2],
    [3,4,5],
    [6,7,8],
    [0,3,6],
    [1,4,7],
    [2,5,8],
    [0,4,8],
    [2,4,6]
];

const boardEl =
    document.getElementById("board");

const statusEl =
    document.getElementById("status");

const modeEl =
    document.getElementById("mode");

const lanPanel =
    document.getElementById("lanPanel");

modeEl.onchange = ()=>{

    if(modeEl.value === "lan"){

        lanPanel.classList.remove("hidden");

        loadRooms();

    }else{

        lanPanel.classList.add("hidden");
    }

    resetGame();
};

// =====================================================
// DRAW
// =====================================================

function drawBoard(){

    boardEl.innerHTML = "";

    board.forEach((value,index)=>{

        const cell =
            document.createElement("div");

        cell.className = "cell";

        cell.innerText = value;

        cell.onclick = ()=>move(index);

        boardEl.appendChild(cell);
    });
}

drawBoard();

// =====================================================
// MOVE
// =====================================================

function move(index){

    if(over) return;

    if(board[index]) return;

    // ================= LAN =================

    if(modeEl.value === "lan"){

        if(turn !== myPlayer)
            return;
    }

    board[index] = turn;

    drawBoard();

    if(checkWinner(turn)){

        statusEl.innerText =
            turn + " wins!";

        over = true;

        saveRoom();

        return;
    }

    if(board.every(v=>v)){

        statusEl.innerText =
            "Draw!";

        over = true;

        saveRoom();

        return;
    }

    turn =
        turn === "X"
            ? "O"
            : "X";

    statusEl.innerText =
        "Player " + turn + " turn";

    // ================= BOT =================

    if(modeEl.value === "bot" && turn === "O"){

        setTimeout(botMove,400);
    }

    saveRoom();
}

// =====================================================
// CHECK WIN
// =====================================================

function checkWinner(player){

    return wins.some(combo =>
        combo.every(i => board[i] === player)
    );
}

// =====================================================
// BOT
// =====================================================

function botMove(){

    const free = board
        .map((v,i)=>v ? null : i)
        .filter(v=>v!==null);

    move(
        free[Math.random()*free.length|0]
    );
}

// =====================================================
// RESET
// =====================================================

function resetGame(){

    board = Array(9).fill("");

    turn = "X";

    over = false;

    statusEl.innerText =
        "Player X turn";

    drawBoard();

    if(modeEl.value === "lan"){

        saveRoom();
    }
}

// =====================================================
// LAN SYSTEM
// =====================================================

const ROOM_KEY = "ttt_rooms";

let roomId = null;

let myPlayer = null;

// =====================================================
// CREATE ROOM
// =====================================================

function createRoom(){

    const name =
        document
        .getElementById("roomInput")
        .value
        .trim();

    if(!name) return;

    const rooms =
        JSON.parse(
            localStorage.getItem(ROOM_KEY)
            || "[]"
        );

    const id =
        Math.random()
        .toString(36)
        .slice(2);

    rooms.push({
        id,
        name,
        board:Array(9).fill(""),
        turn:"X",
        over:false,
        players:1
    });

    localStorage.setItem(
        ROOM_KEY,
        JSON.stringify(rooms)
    );

    joinRoom(id,"X");

    loadRooms();
}

// =====================================================
// LOAD ROOMS
// =====================================================

function loadRooms(){

    const roomsEl =
        document.getElementById("rooms");

    roomsEl.innerHTML = "";

    const rooms =
        JSON.parse(
            localStorage.getItem(ROOM_KEY)
            || "[]"
        );

    rooms.forEach(room=>{

        if(room.players >= 2)
            return;

        const div =
            document.createElement("div");

        div.className = "room";

        div.innerHTML = `
            <span>${room.name}</span>
            <button onclick="joinRoom('${room.id}','O')">
                Join
            </button>
        `;

        roomsEl.appendChild(div);
    });
}

// =====================================================
// JOIN ROOM
// =====================================================

function joinRoom(id,player){

    roomId = id;

    myPlayer = player;

    const rooms =
        JSON.parse(
            localStorage.getItem(ROOM_KEY)
            || "[]"
        );

    const room =
        rooms.find(r=>r.id===id);

    if(!room) return;

    if(player === "O"){

        room.players = 2;
    }

    localStorage.setItem(
        ROOM_KEY,
        JSON.stringify(rooms)
    );

    board = room.board;

    turn = room.turn;

    over = room.over;

    drawBoard();

    statusEl.innerText =
        "Sei " + myPlayer;
}

// =====================================================
// SAVE ROOM
// =====================================================

function saveRoom(){

    if(modeEl.value !== "lan")
        return;

    if(!roomId)
        return;

    const rooms =
        JSON.parse(
            localStorage.getItem(ROOM_KEY)
            || "[]"
        );

    const room =
        rooms.find(r=>r.id===roomId);

    if(!room) return;

    room.board = board;

    room.turn = turn;

    room.over = over;

    localStorage.setItem(
        ROOM_KEY,
        JSON.stringify(rooms)
    );
}

// =====================================================
// AUTO SYNC
// =====================================================

setInterval(()=>{

    if(modeEl.value !== "lan")
        return;

    if(!roomId)
        return;

    const rooms =
        JSON.parse(
            localStorage.getItem(ROOM_KEY)
            || "[]"
        );

    const room =
        rooms.find(r=>r.id===roomId);

    if(!room) return;

    board = room.board;

    turn = room.turn;

    over = room.over;

    drawBoard();

},500);

</script>

</body>
</html>
