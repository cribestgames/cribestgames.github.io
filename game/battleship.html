<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Battleship</title>

<script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0d1b2a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.container{ width:100%; max-width:500px; text-align:center; }

.top-controls{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
}

button,input,select{
  padding:10px;
  border:none;
  border-radius:10px;
  margin:5px;
  font-size:16px;
}

button{
  background:#1d6fa4;
  color:white;
  cursor:pointer;
}

button:hover{ opacity:0.9; }

input,select{
  background:#1e293b;
  color:white;
}

#status{
  margin-top:15px;
  color:#94a3b8;
  font-size:18px;
  min-height:28px;
}

#onlinePanel{
  margin-top:15px;
  display:none;
}

#shipSelector{
  display:none;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
  margin-top:12px;
}

.ship-opt{
  background:#1e293b;
  border:2px solid #2a4a6a;
  color:#94a3b8;
  border-radius:8px;
  padding:6px 10px;
  cursor:pointer;
  font-size:13px;
}

.ship-opt.active{
  border-color:#1d9ac0;
  color:#fff;
}

.ship-opt.done{
  border-color:#1a5c3a;
  color:#4ade80;
}

#rotateBtn{
  background:#153a50;
}

.board{
  display:grid;
  gap:4px;
  margin-top:16px;
  grid-template-columns:22px repeat(10,1fr);
  max-width:420px;
  margin:auto;
}

.cell{
  aspect-ratio:1;
  background:#1e3a5a;
  border-radius:5px;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
}

.cell.ship{ background:#1d6fa4; }
.cell.hit{ background:#c0392b; }
.cell.miss{ background:#2c4a60; }

.hidden{ display:none; }

</style>
</head>

<body>

<div class="container">

<h1>Battleship</h1>

<div class="top-controls">
  <select id="mode">
    <option value="bot">bot</option>
    <option value="local">Local 2P</option>
    <option value="online">Online</option>
  </select>

  <button onclick="newGame()">New Game</button>
  <button onclick="autoPlace()">Auto-Place</button>
  <button onclick="rotateShip()" id="rotateBtn">Rotate</button>
</div>

<div id="onlinePanel">
  <input id="roomInput" placeholder="Room name"/>
  <button onclick="hostRoom()">Create room</button>
  <button onclick="joinRoom()">Join</button>
</div>

<div id="shipSelector"></div>

<div id="status">Press New Game</div>

<div class="board" id="board"></div>
<div class="board" id="board2" style="display:none"></div>

</div>

<script>

// ─────────────────────────────
// STATE
// ─────────────────────────────

const boardEl=document.getElementById("board");
const board2El=document.getElementById("board2");
const statusEl=document.getElementById("status");
const modeEl=document.getElementById("mode");

let mode="bot";
let phase="idle";
let turn="me";

let myGrid, foeGrid;
let myShots, foeShots;

let myFleet=[], foeFleet=[];

let placed={}, placing=null;
let orient="H";

let peer=null, conn=null;

let gameOver=false;

// ─────────────────────────────
// UTILS
// ─────────────────────────────

const rc=(r,c)=>r*10+c;

function empty(){ return Array(100).fill(null); }

function status(t){ statusEl.innerText=t; }

// ─────────────────────────────
// RESET
// ─────────────────────────────

function reset(){
  myGrid=empty();
  foeGrid=empty();
  myShots=empty();
  foeShots=empty();

  myFleet=[];
  foeFleet=[];
  placed={};
  placing=null;
  orient="H";
  gameOver=false;
  turn="me";

  status("Ready");
  draw();
}

// ─────────────────────────────
// NEW GAME
// ─────────────────────────────

function newGame(){
  mode=modeEl.value;
  reset();

  if(mode==="bot"){
    autoEnemy();
  }
}

// ─────────────────────────────
// BOT ENEMY
// ─────────────────────────────

function autoEnemy(){
  for(let i=0;i<8;i++){
    let x;
    do{x=Math.floor(Math.random()*100);}while(foeGrid[x]);
    foeGrid[x]={shipId:"bot"};
  }
}

// ─────────────────────────────
// FIRE
// ─────────────────────────────

function fire(i,isBot=false){

  if(gameOver) return;
  if(myShots[i]) return;

  if(mode==="online" && turn!=="me") return;
  if(mode==="bot" && turn!=="me" && !isBot) return;

  const hit=!!foeGrid[i];
  myShots[i]=hit?"hit":"miss";

  if(conn) conn.send({type:"shot",idx:i,hit});

  if(hit){
    const ship=foeFleet.find(s=>s.id==="bot");
    if(ship) ship.hits=(ship.hits||[]).concat(i);
  }

  draw();

  if(checkWin()){
    gameOver=true;
    status("You win!");
    return;
  }

  if(hit){
    status("Hit! play again");
    if(mode==="bot") setTimeout(()=>botMove(),400);
  }else{
    switchTurn();
  }
}

// ─────────────────────────────
// BOT
// ─────────────────────────────

function botMove(){
  if(gameOver) return;

  let i;
  do{i=Math.floor(Math.random()*100);}while(myShots[i]);

  const hit=!!myGrid[i];
  myShots[i]=hit?"hit":"miss";

  draw();

  if(checkLose()){
    gameOver=true;
    status("Bot wins!");
    return;
  }

  if(hit){
    setTimeout(botMove,400);
  }else{
    switchTurn();
  }
}

// ─────────────────────────────
// TURN FIX (IMPORTANT)
// ─────────────────────────────

function switchTurn(){
  turn = turn==="me"?"foe":"me";
}

// ─────────────────────────────
// WIN CHECK SAFE
// ─────────────────────────────

function checkWin(){
  return foeGrid.every((c,i)=>!c || myShots[i]==="hit");
}

function checkLose(){
  return myGrid.every((c,i)=>!c || myShots[i]==="hit");
}

// ─────────────────────────────
// ONLINE PLACEHOLDER
// ─────────────────────────────

function hostRoom(){}
function joinRoom(){}

// ─────────────────────────────
// AUTO PLACE
// ─────────────────────────────

function autoPlace(){
  status("Auto...");
}

// ─────────────────────────────
// DRAW
// ─────────────────────────────

function draw(){
  boardEl.innerHTML="";

  for(let i=0;i<100;i++){
    const d=document.createElement("div");
    d.className="cell";

    if(myShots[i]==="hit") d.classList.add("hit");
    if(myShots[i]==="miss") d.classList.add("miss");

    d.onclick=()=>fire(i);

    boardEl.appendChild(d);
  }
}

</script>

</body>
</html>
