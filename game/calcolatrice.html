<!DOCTYPE html>
<html lang="it">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9156802341247934"
     crossorigin="anonymous"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcolatrice</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #161618;
    --surface2: #1e1e21;
    --border: #2a2a2f;
    --accent: #c8f135;
    --accent2: #7b61ff;
    --text: #e8e8ec;
    --muted: #6b6b75;
    --error: #ff6b6b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 48px 16px 80px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  .wrapper { position: relative; z-index: 1; width: 100%; max-width: 640px; }

  header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 40px;
  }

  header h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 700;
    letter-spacing: -1px;
    color: var(--text);
  }

  header h1 span { color: var(--accent); }

  /* Main input area */
  .input-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .input-area:focus-within { border-color: var(--accent); }

  .input-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    font-family: 'Space Mono', monospace;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .expr-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    color: var(--text);
    caret-color: var(--accent);
  }

  .expr-input::placeholder { color: var(--muted); font-style: italic; }

  .calc-btn {
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: 8px;
    width: 44px;
    height: 44px;
    font-size: 20px;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .calc-btn:hover { transform: scale(1.07); }
  .calc-btn:active { transform: scale(0.96); }

  /* Result */
  .result-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
    margin-bottom: 20px;
    min-height: 76px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s;
    opacity: 0;
    transform: translateY(6px);
  }

  .result-box.show {
    opacity: 1;
    transform: translateY(0);
  }

  .result-box.error { border-color: var(--error); }
  .result-box.success { border-color: var(--accent); }

  .result-icon {
    font-size: 22px;
    flex-shrink: 0;
  }

  .result-text {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    word-break: break-all;
  }

  .result-box.error .result-text { color: var(--error); font-size: 14px; font-weight: 400; }

  /* Quick reference */
  .ref-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .ref-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    cursor: pointer;
    user-select: none;
  }

  .ref-header span:first-child {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .ref-toggle {
    color: var(--muted);
    font-size: 12px;
    transition: transform 0.2s;
  }

  .ref-toggle.open { transform: rotate(180deg); }

  .ref-body { display: none; padding: 0 20px 16px; }
  .ref-body.open { display: block; }

  .example-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .chip {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    color: var(--text);
    transition: all 0.15s;
  }

  .chip:hover {
    background: var(--accent);
    color: #0d0d0f;
    border-color: var(--accent);
  }

  /* History */
  .history {
    margin-top: 24px;
  }

  .history-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
    animation: slideIn 0.15s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .history-item:hover { border-color: var(--accent2); }

  .history-expr {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }

  .history-res {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }

  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
    float: right;
    margin-top: -4px;
  }

  .clear-btn:hover { border-color: var(--error); color: var(--error); }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <h1>Calco<span>_</span>latrice</h1>
  </header>

  <!-- Input -->
  <div class="input-area">
    <div class="input-label" id="inputLabel">Espressione</div>
    <div class="input-row">
      <input class="expr-input" id="exprInput" placeholder="es. (3+4)*2^3  oppure  2:4=5:x" autocomplete="off" spellcheck="false">
      <button class="calc-btn" onclick="calculate()">＝</button>
    </div>
  </div>

  <!-- Result -->
  <div class="result-box" id="resultBox">
    <span class="result-icon" id="resultIcon"></span>
    <span class="result-text" id="resultText"></span>
  </div>

  <!-- Quick examples -->
  <div class="ref-section">
    <div class="ref-header" onclick="toggleRef()">
      <span>Esempi rapidi</span>
      <span class="ref-toggle" id="refToggle">▼</span>
    </div>
    <div class="ref-body" id="refBody">
      <div class="example-chips" id="exampleChips"></div>
    </div>
  </div>

  <!-- History -->
  <div class="history" id="historySection" style="display:none">
    <div class="history-title" style="display:flex;align-items:center;justify-content:space-between;">
      Cronologia
      <button class="clear-btn" onclick="clearHistory()">Cancella</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<script>
// ─── Fraction support ─────────────────────────────────────────────

// Parse a string like "3/4" or "7" into a decimal number
function parseFraction(s) {
  s = s.trim();
  const m = s.match(/^(-?\d+)\/(\d+)$/);
  if (m) {
    const num = parseInt(m[1]);
    const den = parseInt(m[2]);
    if (den === 0) throw new Error('Divisione per zero');
    return num / den;
  }
  const n = parseFloat(s);
  if (isNaN(n)) throw new Error('Numero non valido: ' + s);
  return n;
}

// ─── Math engine ──────────────────────────────────────────────────

function calcEngine(expr) {
  // Replace colon division with slash for standard calc (but only when not proportion)
  expr = expr.replace(/\[/g,'(').replace(/\]/g,')');
  expr = expr.replace(/\{/g,'(').replace(/\}/g,')');
  expr = expr.replace(/\^/g,'**');
  // Replace colons used as division with slash
  expr = expr.replace(/:/g,'/');

  // Support fraction literals: replace "a/b" patterns (not already inside exponent) with their decimal
  // We let JS handle a/b natively since / is division in JS — this works!
  try {
    const result = Function('"use strict"; return (' + expr + ')')();
    if (typeof result !== 'number' || !isFinite(result)) throw new Error('Risultato non valido');
    // Try to display as fraction if result is "nice"
    const frac = toFraction(result);
    if (frac) return frac;
    return Number.isInteger(result) ? String(result) : String(parseFloat(result.toFixed(10)));
  } catch(e) {
    throw new Error('Espressione non valida');
  }
}

// Convert a decimal to a fraction string if it's a simple one
function toFraction(x) {
  if (Number.isInteger(x)) return null; // return null so caller uses integer form
  for (let den = 2; den <= 100; den++) {
    const num = Math.round(x * den);
    if (Math.abs(num / den - x) < 1e-9) {
      const g = gcd(Math.abs(num), den);
      const rn = num / g, rd = den / g;
      if (rd === 1) return null;
      if (rd <= 100) return `${rn}/${rd}`;
    }
  }
  return null;
}

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function fmtNum(n) {
  if (Number.isInteger(n)) return String(n);
  const frac = toFraction(n);
  if (frac) return frac;
  return String(parseFloat(n.toFixed(6)));
}

// ─── Proportion solvers ──────────────────────────────────────────
// Accept : as separator (also / for legacy), and fraction values like 1/2

// Number token: integer, decimal, or fraction like 1/2
const NUM = '(\\d+(?:\\.\\d+)?(?:\\/\\d+)?)';
const NUMRE = new RegExp(NUM);

function parseNum(s) { return parseFraction(s); }

function proporzione2x(line) {
  line = line.replace(/\s/g,'');
  // Accepts: 2x=10 or 2x=1/2
  const m = line.match(new RegExp(`^(\\d*)x=${NUM}$`));
  if (!m) throw new Error('Formato: 2x = 10');
  const coeff = m[1] ? parseInt(m[1]) : 1;
  const x = parseNum(m[2]) / coeff;
  return `x = ${fmtNum(x)}`;
}

function proporzioneClassica(line) {
  // Format: a:b = c:x  (or a/b = c/x, legacy)
  line = line.replace(/\s/g,'');
  // Normalize separators: allow : or /
  // Pattern: NUM (: or /) NUM = NUM (: or /) letter
  const m = line.match(new RegExp(`^${NUM}[:/]${NUM}=${NUM}[:/]([a-zA-Z])$`));
  if (!m) throw new Error('Formato: 2:4 = 5:x');
  const [,a,b,c,xv] = m;
  const x = parseNum(b)*parseNum(c)/parseNum(a);
  return `${xv} = ${fmtNum(x)}`;
}

function proporzioneXY(line) {
  line = line.replace(/\s/g,'');
  const [prop, known] = line.split(',');
  if (!prop || !known) throw new Error('Formato: x:y=3:4, y=8');
  // x:y = a:b or x/y = a/b
  const m = prop.match(new RegExp(`^x[:/]y=${NUM}[:/]${NUM}$`));
  if (!m) throw new Error('Formato: x:y=3:4, y=8');
  const [,a,b] = m;
  const [vr, vl] = known.split('=');
  const val = parseNum(vl);
  if (vr === 'y') return `x = ${fmtNum(val*parseNum(a)/parseNum(b))}`;
  if (vr === 'x') return `y = ${fmtNum(val*parseNum(b)/parseNum(a))}`;
  throw new Error('Variabile deve essere x o y');
}

function proporzioneXYProd(line) {
  line = line.replace(/\s/g,'');
  // x:y=27:21, xy=63
  const m = line.match(new RegExp(`^x[:/]y=${NUM}[:/]${NUM},[xX][yY]=${NUM}$`));
  if (!m) throw new Error('Formato: x:y=27:21, xy=63');
  const [,a,b,prod] = m.map((v,i) => i===0 ? v : parseNum(v));
  const y = Math.sqrt(prod * b / a);
  const x = (a/b)*y;
  return `x = ${fmtNum(x)}, y = ${fmtNum(y)}`;
}

// ─── Auto-detect & calculate ──────────────────────────────────────

const examples = [
  '(3+4)*2^3',
  '1/2 + 1/3',
  '3/4 * 2',
  '15%4',
  '2^10',
  '2x = 10',
  '3x = 1/2',
  '2:4 = 5:x',
  '1/2 : 1/4 = x : 3',
  'x:y=3:4, y=8',
  'x:y=27:21, xy=63',
];

let history = JSON.parse(localStorage.getItem('calc_history') || '[]');

function renderChips() {
  document.getElementById('exampleChips').innerHTML = examples.map(
    e => `<span class="chip" onclick="useExample('${e.replace(/'/g,"\\'")}')">${e}</span>`
  ).join('');
}

function useExample(ex) {
  document.getElementById('exprInput').value = ex;
  document.getElementById('exprInput').focus();
  calculate();
}

function toggleRef() {
  const body = document.getElementById('refBody');
  const toggle = document.getElementById('refToggle');
  const open = body.classList.toggle('open');
  toggle.classList.toggle('open', open);
}

function calculate() {
  const input = document.getElementById('exprInput').value.trim();
  if (!input) return;
  try {
    let result;
    const norm = input.replace(/\s/g,'');

    // Build regex patterns that accept : or / as proportion separator, and fraction numerals
    const NP = '\\d+(?:\\.\\d+)?(?:\\/\\d+)?'; // number pattern (incl. fractions)

    if (new RegExp(`^\\d*x=${NP}$`).test(norm)) {
      result = proporzione2x(input);
    } else if (new RegExp(`^x[:/]y=${NP}[:/]${NP},[xX][yY]=${NP}$`).test(norm)) {
      result = proporzioneXYProd(input);
    } else if (new RegExp(`^x[:/]y=${NP}[:/]${NP},[xy]=${NP}$`).test(norm)) {
      result = proporzioneXY(input);
    } else if (new RegExp(`^${NP}[:/]${NP}=${NP}[:/][a-zA-Z]$`).test(norm)) {
      result = proporzioneClassica(input);
    } else {
      result = calcEngine(input);
    }

    showResult(result, false);
    addHistory(input, result);
  } catch(e) {
    showResult(e.message, true);
  }
}

function showResult(text, isError) {
  const box = document.getElementById('resultBox');
  const txt = document.getElementById('resultText');
  const icon = document.getElementById('resultIcon');
  box.className = 'result-box show ' + (isError ? 'error' : 'success');
  txt.textContent = text;
  icon.textContent = isError ? '✗' : '=';
}

function hideResult() {
  document.getElementById('resultBox').className = 'result-box';
}

// ─── History ──────────────────────────────────────────────────────

function addHistory(expr, result) {
  history.unshift({ expr, result });
  if (history.length > 20) history.pop();
  localStorage.setItem('calc_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  if (history.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = history.slice(0,8).map(h =>
    `<div class="history-item" onclick="reuseHistory('${h.expr.replace(/'/g,"\\'")}')">
      <span class="history-expr">${h.expr}</span>
      <span class="history-res">${h.result}</span>
    </div>`
  ).join('');
}

function reuseHistory(expr) {
  document.getElementById('exprInput').value = expr;
  calculate();
}

function clearHistory() {
  history = [];
  localStorage.removeItem('calc_history');
  renderHistory();
}

// ─── Init ─────────────────────────────────────────────────────────

document.getElementById('exprInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') calculate();
});

renderChips();
renderHistory();
</script>
</body>
</html>
