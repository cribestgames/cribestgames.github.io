<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9156802341247934" crossorigin="anonymous"></script>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CribestGames</title>
  <meta name="description" content="Play free browser games on CribestGames.">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: rgb(54, 18, 18);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-tap-highlight-color: transparent;
    }

    header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
    }

    .back-btn {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }

    .back-btn:hover { color: white; }

    .site-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.85);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 6px 0 14px;
      text-align: center;
      letter-spacing: 0.03em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .game-preview {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16/9;
      border-radius: 10px;
      overflow: hidden;
      background: black;
      box-shadow: 0 4px 30px rgba(0,0,0,0.6);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game-preview img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.45;
    }

    .play-btn {
      position: relative;
      z-index: 10;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 90px;
      color: white;
      text-shadow: 0 0 40px rgba(0,0,0,0.8);
      user-select: none;
    }

    .iframe-wrap {
      display: none;
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16/9;
      border-radius: 10px;
      overflow: hidden;
      background: black;
      box-shadow: 0 4px 30px rgba(0,0,0,0.6);
      position: relative;
    }

    .iframe-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* 🔥 overlay per click fullscreen */
    .fullscreen-catcher {
      position: absolute;
      inset: 0;
      z-index: 5;
      cursor: pointer;
    }

    .description {
      width: 100%;
      max-width: 900px;
      margin: 18px 0 30px;
      padding: 0 16px;
      font-size: 14px;
      line-height: 1.6;
      color: rgba(255,255,255,0.75);
      text-align: center;
    }

    .license {
      margin-top: auto;
      padding: 14px;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
    }

    .error-msg {
      display: none;
      margin-top: 60px;
      font-size: 18px;
      color: rgba(255,255,255,0.6);
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  <a class="back-btn" id="back-btn" href="/">← Home</a>
  <span class="site-name">CribestGames</span>
  <span style="width:60px"></span>
</header>

<h1 id="game-title">Loading…</h1>

<div class="game-preview" id="game-preview">
  <img id="game-thumb" alt="" style="display:none">
  <button class="play-btn" id="play-btn">▶</button>
</div>

<div class="iframe-wrap" id="iframe-wrap">
  <div class="fullscreen-catcher" id="fs-catcher"></div>
  <iframe id="game-frame" src="about:blank" allowfullscreen></iframe>
</div>

<p class="description" id="game-desc"></p>
<p class="error-msg" id="error-msg"></p>

<div class="license">Copyright © 2025-2026 cribest7890</div>

<script>
  const params  = new URLSearchParams(window.location.search);
  const gameKey = params.get('game');

  var rawLang = navigator.language || 'en';
  var lang = rawLang.startsWith('it') ? 'it' : rawLang.startsWith('uk') ? 'uk' : 'en';

  document.getElementById('back-btn').href = '/' + lang + '/';

  let gameIframe = '';
  let forceLandscape = false;

  if (gameKey) {
    fetch('/data/' + lang + '/' + gameKey + '.json')
      .then(res => res.json())
      .then(data => {
        gameIframe = data.iframe;
        forceLandscape = !!data.landscape;
        document.getElementById('game-title').textContent = data.title;
        document.getElementById('game-desc').textContent = data.description;

        const thumb = document.getElementById('game-thumb');
        thumb.src = '/assets/' + gameKey + '/logo.png';
        thumb.style.display = 'block';
      });
  }

  const frame = document.getElementById('game-frame');
  const preview = document.getElementById('game-preview');
  const iframeWrap = document.getElementById('iframe-wrap');
  const catcher = document.getElementById('fs-catcher');

  function enterFS() {
    const req = iframeWrap.requestFullscreen
      ? iframeWrap.requestFullscreen()
      : iframeWrap.webkitRequestFullscreen
        ? iframeWrap.webkitRequestFullscreen()
        : Promise.resolve();

    req.then(() => {
      if (forceLandscape && screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(() => {});
      }
    }).catch(() => {});
  }

  document.getElementById('play-btn').addEventListener('click', () => {
    if (!gameIframe) return;
    frame.src = gameIframe;
    preview.style.display = 'none';
    iframeWrap.style.display = 'block';
    enterFS();
  });

  // 🔥 click dopo uscita fullscreen
  catcher.addEventListener('click', () => {
    if (!document.fullscreenElement) {
      enterFS();
    }
  });

  // nasconde overlay in fullscreen
  document.addEventListener('fullscreenchange', () => {
    catcher.style.display = document.fullscreenElement ? 'none' : 'block';
  });
</script>

</body>
</html>
