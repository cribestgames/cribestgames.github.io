<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9156802341247934" crossorigin="anonymous"></script>
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CribestGames</title>
  <meta name="description" content="Play free browser games on CribestGames.">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* Blocca pull-to-refresh e overscroll su iOS/Android */
    html, body {
      overscroll-behavior: none;
      overscroll-behavior-y: none;
      -webkit-overflow-scrolling: auto;
    }

    body {
      background-color: rgb(54, 18, 18);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-tap-highlight-color: transparent;
    }

    header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
    }

    .back-btn {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }

    .back-btn:hover { color: white; }

    .site-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.85);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 6px 0 14px;
      text-align: center;
      letter-spacing: 0.03em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .game-preview {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16/9;
      border-radius: 10px;
      overflow: hidden;
      background: black;
      box-shadow: 0 4px 30px rgba(0,0,0,0.6);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game-preview img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.45;
    }

    .play-btn {
      position: relative;
      z-index: 10;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 90px;
      color: white;
      text-shadow: 0 0 40px rgba(0,0,0,0.8);
      user-select: none;
    }

    /* ── FAKE FULLSCREEN OVERLAY ── */
    #fake-fs {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgb(54, 18, 18); /* stesso colore della pagina */
      flex-direction: row;
    }

    #fake-fs.active {
      display: flex;
    }

    /* Barra sinistra 20px */
    #fs-sidebar {
      width: 20px;
      flex-shrink: 0;
      background: rgb(54, 18, 18);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      position: relative;
      z-index: 2;
    }

    #fs-exit-label {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      transition: color 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }

    #fs-sidebar:hover #fs-exit-label,
    #fs-sidebar:active #fs-exit-label {
      color: rgba(255,255,255,0.95);
    }

    /* Contenitore iframe: occupa il resto (calc 100% - 20px) */
    #fs-iframe-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: black;
    }

    #fs-iframe-container iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── fine fake fullscreen ── */

    .description {
      width: 100%;
      max-width: 900px;
      margin: 18px 0 30px;
      padding: 0 16px;
      font-size: 14px;
      line-height: 1.6;
      color: rgba(255,255,255,0.75);
      text-align: center;
    }

    .more-games {
      width: 100%;
      max-width: 900px;
      margin: 0 auto 32px;
      padding: 0 16px;
    }

    .more-games-title {
      font-size: 16px;
      color: rgba(255,255,255,0.9);
      margin: 0 0 16px;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .more-games-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }

    .more-game-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      text-decoration: none;
      color: white;
      transition: transform 0.2s ease, background-color 0.2s ease;
      min-height: 170px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
    }

    .more-game-item:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.12);
    }

    .more-game-item img {
      width: 64px;
      height: 64px;
      object-fit: contain;
    }

    .more-game-item span {
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      line-height: 1.3;
      color: rgba(255,255,255,0.95);
      text-transform: none;
      word-break: break-word;
    }

    .license {
      margin-top: auto;
      padding: 14px;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
    }

    .error-msg {
      display: none;
      margin-top: 60px;
      font-size: 18px;
      color: rgba(255,255,255,0.6);
      text-align: center;
    }
  </style>
</head>

<body>

<!-- FAKE FULLSCREEN -->
<div id="fake-fs">
  <div id="fs-sidebar" title="Exit">
    <span id="fs-exit-label">Exit</span>
  </div>
  <div id="fs-iframe-container">
    <iframe id="game-frame-fs" src="about:blank" allowfullscreen></iframe>
  </div>
</div>

<header>
  <a class="back-btn" id="back-btn" href="/">← Home</a>
  <span class="site-name">CribestGames</span>
  <span style="width:60px"></span>
</header>

<h1 id="game-title">Loading…</h1>

<div class="game-preview" id="game-preview">
  <img id="game-thumb" alt="" style="display:none">
  <button class="play-btn" id="play-btn">▶</button>
</div>

<p class="description" id="game-desc"></p>

<div class="more-games">
  <div class="more-games-title" id="more-games-title">Other games</div>
  <div class="more-games-grid" id="suggested-games"></div>
</div>

<p class="error-msg" id="error-msg"></p>

<div class="license">Copyright © 2025-2026 cribest7890</div>

<script>
  const params  = new URLSearchParams(window.location.search);
  const gameKey = params.get('game');

  var rawLang = navigator.language || 'en';
  var lang = rawLang.startsWith('it') ? 'it' : rawLang.startsWith('uk') ? 'uk' : 'en';

  document.getElementById('back-btn').href = '/' + lang + '/';

  // Etichetta exit in base alla lingua
  var exitLabels = { en: 'Exit', it: 'Esci', uk: 'Вийти' };
  document.getElementById('fs-exit-label').textContent = exitLabels[lang] || 'Exit';

  let gameIframe = '';

  const suggestedGames = [
    'ball-clicker',
    'logo-dvd',
    'tower-ability',
    'delicate-flower',
    '2048',
    'minesweeper',
    'tic-tac-toe',
    'rocket-goal'
  ];

  const localizedGameNames = {
    en: {
      'ball-clicker': 'ball clicker',
      'logo-dvd': 'DVD screensaver',
      'tower-ability': 'tower ability',
      'delicate-flower': 'delicate flower',
      '2048': '2048',
      'minesweeper': 'minesweeper',
      'tic-tac-toe': 'tic-tac-toe',
      'rocket-goal': 'rocket-goal'
    },
    it: {
      'ball-clicker': 'ball clicker',
      'logo-dvd': 'DVD screensaver',
      'tower-ability': "torre dell'abilità",
      'delicate-flower': 'fiore delicato',
      '2048': '2048',
      'minesweeper': 'Campo minato',
      'tic-tac-toe': 'tris',
      'rocket-goal': 'rocket-goal'
    },
    uk: {
      'ball-clicker': 'ball clicker',
      'logo-dvd': 'DVD screensaver',
      'tower-ability': 'вежа здібностей',
      'delicate-flower': 'ніжна квітка',
      '2048': '2048',
      'minesweeper': 'тральщик',
      'tic-tac-toe': 'хрестики-нулики',
      'rocket-goal': 'rocket-goal'
    }
  };

  const suggestionsLabel = { en: 'Other games', it: 'Altri giochi', uk: 'Інші ігри' };
  document.getElementById('more-games-title').textContent = suggestionsLabel[lang] || suggestionsLabel.en;

  async function renderSuggestionList() {
    const grid = document.getElementById('suggested-games');
    const keys = suggestedGames.filter(key => key !== gameKey);
    shuffle(keys);

    for (const key of keys) {
      let title = localizedGameNames[lang][key] || localizedGameNames.en[key];

      try {
        const response = await fetch('/data/' + lang + '/' + key + '.json');
        if (response.ok) {
          const data = await response.json();
          title = data.title || title;
        }
      } catch (error) {
        // keep fallback title
      }

      const link = document.createElement('a');
      link.className = 'more-game-item';
      link.href = '/games?game=' + key;
      link.innerHTML = `
        <img src="/assets/${key}/logo.png" alt="${title}">
        <span>${title}</span>
      `;
      grid.appendChild(link);
    }
  }

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  if (gameKey) {
    fetch('/data/' + lang + '/' + gameKey + '.json')
      .then(res => res.json())
      .then(data => {
        gameIframe = data.iframe;
        document.getElementById('game-title').textContent = data.title;
        document.getElementById('game-desc').textContent = data.description;

        const thumb = document.getElementById('game-thumb');
        thumb.src = '/assets/' + gameKey + '/logo.png';
        thumb.style.display = 'block';
      })
      .finally(renderSuggestionList);
  } else {
    renderSuggestionList();
  }

  const fakeFs   = document.getElementById('fake-fs');
  const frameFs  = document.getElementById('game-frame-fs');
  const preview  = document.getElementById('game-preview');
  const sidebar  = document.getElementById('fs-sidebar');

  // true = mobile/touch, false = desktop
  const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

  /* ── FAKE FULLSCREEN (mobile) ── */
  function enterFakeFS() {
    fakeFs.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function exitFakeFS() {
    fakeFs.classList.remove('active');
    document.body.style.overflow = '';
    preview.style.display = '';
  }

  /* ── NATIVE FULLSCREEN (desktop) ── */
  function enterNativeFS() {
    const req = fakeFs.requestFullscreen
      ? fakeFs.requestFullscreen()
      : fakeFs.webkitRequestFullscreen
        ? fakeFs.webkitRequestFullscreen()
        : Promise.resolve();
    req.catch(() => {});
  }

  function exitNativeFS() {
    if (document.fullscreenElement || document.webkitFullscreenElement) {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    }
    // exitFakeFS viene chiamato da fullscreenchange
  }

  // Su desktop, quando il browser esce dal fullscreen nativo ripristina il preview
  document.addEventListener('fullscreenchange', () => {
    if (!isMobile && !document.fullscreenElement) {
      exitFakeFS();
    }
  });
  document.addEventListener('webkitfullscreenchange', () => {
    if (!isMobile && !document.webkitFullscreenElement) {
      exitFakeFS();
    }
  });

  /* ── tasto Exit ── */
  sidebar.addEventListener('click', () => {
    if (isMobile) {
      exitFakeFS();
    } else {
      exitNativeFS();
    }
  });

  /* ── Play button ── */
  let gameStarted = false;

  document.getElementById('play-btn').addEventListener('click', () => {
    if (!gameIframe) return;
    if (!gameStarted) {
      frameFs.src = gameIframe;
      gameStarted = true;
    }
    preview.style.display = 'none';
    if (isMobile) {
      enterFakeFS();
    } else {
      // Su desktop: mostra il fake-fs e poi chiede il fullscreen nativo
      enterFakeFS();
      enterNativeFS();
    }
  });

  // Blocca swipe-down per ricaricare su iOS (touchmove sul fake-fs)
  fakeFs.addEventListener('touchmove', function(e) {
    e.preventDefault();
  }, { passive: false });
</script>

</body>
</html>
