<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure SVG Viewer</title>

<style>
/* --- STILE IDENTICO AL TUO (INVARIATO) --- */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root{
  --accent:#7c6ef7;
  --accent2:#5eead4;
  --bg:#0a0a0f;
  --surface:#12121a;
  --surface2:#1a1a26;
  --border:#2a2a3a;
  --text:#e8e8f0;
  --muted:#6b6b8a;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:24px;
  padding:40px 36px 32px;
  width:100%;
  max-width:420px;
}

#dropZone{
  border:2px dashed var(--border);
  border-radius:16px;
  padding:44px 20px;
  text-align:center;
  cursor:pointer;
  background:var(--surface2);
  transition:all .25s ease;
}

#dropZone.hover{
  border-color:var(--accent);
  box-shadow:0 0 0 4px rgba(124,110,247,.12);
}

#previewWrap{ display:none; margin-top:20px; }
#previewWrap.visible{ display:block; }

#svgContainer{
  padding:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:160px;
  max-height:340px;
  overflow:auto;
}

#svgContainer svg{
  max-width:100%;
  max-height:310px;
}

input[type=file]{ display:none; }

@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}
</style>
</head>

<body>

<div class="card">
  <div id="dropZone">
    <div>🗂️ Trascina SVG</div>
    <div>oppure clicca per selezionare</div>
  </div>

  <div id="previewWrap">
    <div id="previewName"></div>
    <div id="svgContainer"></div>
  </div>
</div>

<!-- ✅ ORA ACCETTA SVG E XML -->
<input type="file" id="fileInput"
accept=".svg,.xml,image/svg+xml,text/xml,application/xml">

<script>
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const previewWrap = document.getElementById("previewWrap");
const svgContainer = document.getElementById("svgContainer");
const previewName = document.getElementById("previewName");

let currentSVG = "";

/* CLICK */
dropZone.onclick = () => fileInput.click();

/* DRAG & DROP */
dropZone.addEventListener("dragover", e=>{
  e.preventDefault();
  dropZone.classList.add("hover");
});

dropZone.addEventListener("dragleave", ()=>{
  dropZone.classList.remove("hover");
});

dropZone.addEventListener("drop", e=>{
  e.preventDefault();
  dropZone.classList.remove("hover");
  handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener("change", e=>{
  if(e.target.files.length>0)
    handleFile(e.target.files[0]);
});

/* --- NUOVA VERSIONE SICURA --- */
function handleFile(file){
  if(!file) return;

  const name=file.name.toLowerCase();
  if(!name.endsWith(".svg") && !name.endsWith(".xml")){
    shake(dropZone);
    return;
  }

  const reader=new FileReader();
  reader.onload=e=>{
    const rawText=e.target.result;

    const parser=new DOMParser();
    const doc=parser.parseFromString(rawText,"image/svg+xml");

    /* errore parsing */
    if(doc.querySelector("parsererror")){
      shake(dropZone);
      return;
    }

    /* deve avere <svg> */
    const svg=doc.querySelector("svg");
    if(!svg){
      shake(dropZone);
      return;
    }

    currentSVG=sanitizeSVG(rawText);
    showPreview(currentSVG,file.name);
  };

  reader.readAsText(file);
}

/* SANITIZZAZIONE */
function sanitizeSVG(svgText){
  const parser=new DOMParser();
  const doc=parser.parseFromString(svgText,"image/svg+xml");

  doc.querySelectorAll("script,foreignObject,use").forEach(el=>el.remove());

  doc.querySelectorAll("*").forEach(el=>{
    [...el.attributes].forEach(attr=>{
      if(attr.name.startsWith("on") ||
         attr.value.toLowerCase().startsWith("javascript:"))
        el.removeAttribute(attr.name);
    });
  });

  return new XMLSerializer().serializeToString(doc);
}

function showPreview(svgContent,name){
  svgContainer.innerHTML=svgContent;
  previewName.textContent=name;
  previewWrap.classList.add("visible");
}

function shake(el){
  el.style.animation="none";
  el.offsetHeight;
  el.style.animation="shake .4s ease";
}
</script>

</body>
</html>
