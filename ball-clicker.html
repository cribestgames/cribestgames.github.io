<!DOCTYPE html>
<html lang="it">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9156802341247934"
     crossorigin="anonymous"></script>
  <meta property="og:image" content="./assets/ball-clicker/logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ball Clicker</title>
  <style>
    body {
      background-color: black;
      margin: 0;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .pallina {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background-color: red;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: all 0.3s ease;
    }

    .contatore, .monete, .absreset {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      color: white;
    }

    .contatore {
      bottom: 200px;
    }

    .monete {
      bottom: 170px;
      color: #ff1d8d;
    }

    .absreset {
      bottom: 140px;
      color: gold;
      opacity: 0;
      transition: all 0.5s ease;
    } 
   
    .license {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      bottom:10px;
      color: #d3d3d3;
    }
  </style>
</head>
<body>

  <img id="shopButton" src="./assets/ball-clicker/shop_icon.png" alt="shop" style="position: absolute; top: 50px; right: 35px; width: 80px; height: auto; z-index: 10; cursor: pointer; pointer-events: auto; -webkit-user-drag: none;">
  <div class="pallina"></div>
  <div class="contatore">clicks: 0</div>
  <div class="monete">resets: 0</div>
  <div class="absreset">absolute resets: 0</div>
  <div class="license">Copyright © 2025 cribest7890</div>
  <div class="shopinfo" style="position: absolute; top: 135px; right: 15px; font-size: 10px; color: white;">5 absolute reset = +0.1x click</div>

  <script>
    window.onload = function() {
      const pallina = document.querySelector('.pallina');
      const contatore = document.querySelector('.contatore');
      const monete = document.querySelector('.monete');
      const absreset = document.querySelector('.absreset');
      const shopButton = document.getElementById("shopButton");

      let clickCount = parseInt(localStorage.getItem('clickCount')) || 0;
      let coinCount = parseInt(localStorage.getItem('coinCount')) || 0;
      let absresetCount = parseInt(localStorage.getItem('absresetCount')) || 0;
      let pallinaSize = parseFloat(localStorage.getItem('pallinaSize')) || 50;
      let clickMultiplier = parseFloat(localStorage.getItem('clickMultiplier')) || 1;
      const maxSize = Math.min(window.innerWidth, window.innerHeight);

      // Aggiorna i contatori iniziali
      contatore.innerText = "click: " + clickCount.toFixed(1);
      monete.innerText = "resets: " + coinCount;
      absreset.innerText = "absolute resets: " + absresetCount;
      if (absresetCount > 0) {
        absreset.style.opacity = 1;
        pallina.style.width = pallinaSize + "px";
        pallina.style.height = pallinaSize + "px";
      }

      function handleClick() {
        clickCount += 1 * clickMultiplier;

        const colore = "#" + Math.floor(Math.random() * 16777215).toString(16);
        pallina.style.backgroundColor = colore;

        pallinaSize *= 1.1 + coinCount * 0.01;
        pallina.style.width = pallinaSize + "px";
        pallina.style.height = pallinaSize + "px";

        if (pallinaSize >= maxSize) {
          pallinaSize = 50 * 1.01;
          pallina.style.width = pallinaSize + "px";
          pallina.style.height = pallinaSize + "px";
          coinCount++;
        }

        if (coinCount >= 700) {
          absresetCount++;
          coinCount -= 700;
          absreset.style.opacity = 1;
        }

        contatore.innerText = "click: " + clickCount.toFixed(1);
        monete.innerText = "resets: " + coinCount;
        absreset.innerText = "absolute resets: " + absresetCount;

        localStorage.setItem('clickCount', clickCount);
        localStorage.setItem('coinCount', coinCount);
        localStorage.setItem('absresetCount', absresetCount);
        localStorage.setItem('pallinaSize', pallinaSize);
      }

      shopButton.addEventListener("click", function(e) {
        e.stopPropagation();
        if (absresetCount >= 5) {
          absresetCount -= 5;
          clickMultiplier += 0.1;
          localStorage.setItem('clickMultiplier', clickMultiplier);
          absreset.innerText = "absolute resets: " + absresetCount;
          localStorage.setItem('absresetCount', absresetCount);
        } else {
          alert("Non hai abbastanza absolute resets!");
        }
      });

      // Click mouse
      document.addEventListener("click", function(e) {
        if (e.target !== shopButton) handleClick();
      });

      // Tastiera (spazio)
      document.addEventListener("keyup", function(e) {
        if (e.code === "Space") {
          handleClick();
        } else {
          e.preventDefault();
        }
      });

      // Multi-touch: ogni dito che tocca conta come un click separato
      document.addEventListener("touchstart", function(e) {
        // Controlla che nessun dito stia toccando il pulsante shop
        let shopTouched = false;
        for (let i = 0; i < e.changedTouches.length; i++) {
          const touch = e.changedTouches[i];
          const target = document.elementFromPoint(touch.clientX, touch.clientY);
          if (target === shopButton) {
            shopTouched = true;
            break;
          }
        }

        if (!shopTouched) {
          e.preventDefault(); // previene il click simulato dal browser
          // Un handleClick per ogni dito attivo
          for (let i = 0; i < e.changedTouches.length; i++) {
            handleClick();
          }
        }
      }, { passive: false });
    };
  </script>

</body>
</html>
