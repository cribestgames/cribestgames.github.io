<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Locale | WebLLM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Cabinet+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #18181f;
            --border: rgba(255,255,255,0.07);
            --accent: #6c63ff;
            --accent2: #a78bfa;
            --user-bg: linear-gradient(135deg, #6c63ff, #a78bfa);
            --ai-bg: #18181f;
            --text: #e8e8f0;
            --text-muted: #6b6b80;
            --text-dim: #3a3a4a;
            --green: #4ade80;
            --red: #f87171;
            --radius: 18px;
            --radius-sm: 10px;
            --font-mono: 'DM Mono', monospace;
            --font-ui: 'Cabinet Grotesk', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-ui);
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        #app {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 780px;
            margin: 0 auto;
        }

        #header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
        }

        .logo-mark {
            width: 34px; height: 34px;
            background: var(--user-bg);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 800; color: #fff;
            box-shadow: 0 0 20px rgba(108,99,255,0.4);
        }

        #status-badge {
            display: flex; align-items: center; gap: 0.4rem;
            font-size: 0.7rem; font-family: var(--font-mono);
            color: var(--text-muted); background: var(--surface2);
            border: 1px solid var(--border); padding: 0.3rem 0.75rem; border-radius: 100px;
        }

        #status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); }
        .loading #status-dot { background: #fbbf24; animation: pulse 1s infinite; }
        .ready #status-dot { background: var(--green); box-shadow: 0 0 8px var(--green); }

        #chat {
            flex: 1; overflow-y: auto; padding: 1.5rem;
            display: flex; flex-direction: column; gap: 1rem;
        }

        .bubble {
            max-width: 85%; padding: 0.8rem 1rem; border-radius: var(--radius);
            font-size: 0.95rem; line-height: 1.6; word-wrap: break-word;
        }

        .bubble.user { background: var(--user-bg); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble.ai { background: var(--ai-bg); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 4px; }

        #progress-wrap { padding: 0 1.5rem; display: none; }
        #progress-wrap.visible { display: block; }
        #progress-bar-outer { height: 4px; background: var(--surface2); border-radius: 10px; margin-top: 5px; }
        #progress-bar-inner { height: 100%; width: 0%; background: var(--accent); transition: width 0.3s; }

        #input-area { padding: 1.5rem; border-top: 1px solid var(--border); }
        #input-box {
            display: flex; gap: 0.6rem; background: var(--surface2);
            padding: 0.6rem; border-radius: var(--radius); border: 1px solid var(--border);
        }

        #userInput {
            flex: 1; background: none; border: none; outline: none;
            color: white; font-family: inherit; resize: none;
        }

        #sendBtn {
            background: var(--user-bg); border: none; color: white;
            padding: 0.5rem 1rem; border-radius: 12px; cursor: pointer;
            font-weight: bold; transition: 0.2s;
        }

        #sendBtn:disabled { opacity: 0.3; cursor: not-allowed; }

        @keyframes pulse { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="app">
    <div id="header">
        <div style="display:flex; align-items:center; gap:10px">
            <div class="logo-mark">AI</div>
            <div>
                <div style="font-weight:bold; font-size:0.9rem">WebLLM Chat</div>
                <div style="font-size:0.7rem; color:var(--text-muted)">Llama 3.2 (Local GPU)</div>
            </div>
        </div>
        <div id="status-badge">
            <div id="status-dot"></div>
            <span id="status-text">Inizializzazione...</span>
        </div>
    </div>

    <div id="progress-wrap">
        <div id="progress-label" style="font-size:0.7rem; font-family:var(--font-mono)">Download Modello AI...</div>
        <div id="progress-bar-outer"><div id="progress-bar-inner"></div></div>
    </div>

    <div id="chat">
        <div class="bubble ai">Ciao! Sto preparando l'intelligenza artificiale sul tuo browser. Attendi il completamento del download (avviene solo la prima volta).</div>
    </div>

    <div id="input-area">
        <div id="input-box">
            <textarea id="userInput" placeholder="Scrivi un messaggio..." rows="1" disabled></textarea>
            <button id="sendBtn" disabled>Invia</button>
        </div>
    </div>
</div>

<!-- LOGICA WEBLLM -->
<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    // Modello leggero ideale per browser (circa 1.5GB - 2GB)
    const selectedModel = "Llama-3.2-1B-Instruct-q4f16_1-MLC";
    
    let engine;
    const chatContainer = document.getElementById("chat");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const statusBadge = document.getElementById("status-badge");
    const statusText = document.getElementById("status-text");
    const progressBar = document.getElementById("progress-bar-inner");
    const progressWrap = document.getElementById("progress-wrap");

    // Funzione per inizializzare il motore AI
    async function init() {
        try {
            statusBadge.classList.add("loading");
            progressWrap.classList.add("visible");

            engine = await webllm.CreateMLCEngine(selectedModel, {
                initProgressCallback: (report) => {
                    const progress = Math.round(report.progress * 100);
                    progressBar.style.width = progress + "%";
                    statusText.innerText = `Caricamento: ${progress}%`;
                }
            });

            statusBadge.classList.replace("loading", "ready");
            statusText.innerText = "Pronto";
            progressWrap.classList.remove("visible");
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.placeholder = "Chiedimi qualsiasi cosa...";

        } catch (err) {
            statusText.innerText = "Errore: WebGPU non supportata";
            console.error(err);
        }
    }

    // Funzione per aggiungere messaggi alla UI
    function appendMessage(role, text) {
        const div = document.createElement("div");
        div.className = `bubble ${role}`;
        div.innerText = text;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return div;
    }

    // Funzione invio
    async function sendMessage() {
        const prompt = userInput.value.trim();
        if (!prompt) return;

        userInput.value = "";
        appendMessage("user", prompt);

        const aiBubble = appendMessage("ai", "...");
        let fullText = "";

        const messages = [{ role: "user", content: prompt }];
        
        const chunks = await engine.chat.completions.create({
            messages,
            stream: true
        });

        for await (const chunk of chunks) {
            const curText = chunk.choices[0]?.delta.content || "";
            fullText += curText;
            aiBubble.innerText = fullText;
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    }

    sendBtn.onclick = sendMessage;
    userInput.onkeydown = (e) => { if(e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }};

    init();
</script>
</body>
</html>
