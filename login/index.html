<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Login - CribestGames</title>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    body {

      margin: 0;

      background: rgb(54, 18, 18);

      font-family:
        'Segoe UI',
        Tahoma,
        Geneva,
        Verdana,
        sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;

      height: 100vh;

      color: white;
    }

    .login-box {

      width: 340px;

      padding: 35px;

      border-radius: 20px;

      background:
        rgba(255,255,255,0.05);

      backdrop-filter: blur(10px);

      box-shadow:
        0 0 30px rgba(0,0,0,0.3);
    }

    h1 {

      margin: 0 0 28px 0;

      text-align: center;

      font-size: 48px;
      font-weight: 700;
    }

    input {

      width: 100%;

      padding: 14px;

      margin-bottom: 16px;

      border:
        1px solid rgba(255,255,255,0.12);

      border-radius: 12px;

      background:
        rgba(255,255,255,0.12);

      color: white;

      font-size: 15px;

      outline: none;

      box-sizing: border-box;

      transition: 0.2s;
    }

    input:focus {

      background:
        rgba(255,255,255,0.18);

      border-color:
        rgba(255,255,255,0.3);
    }

    input::placeholder {

      color:
        rgba(255,255,255,0.55);
    }

    button {

      width: 100%;

      padding: 13px;

      border: none;

      border-radius: 12px;

      font-size: 15px;
      font-weight: bold;

      cursor: pointer;

      transition: 0.2s;

      margin-top: 6px;
    }

    button:hover {

      transform: scale(1.02);
    }

    .login-btn {

      background: white;
      color: black;
    }

    .register-btn {

      background:
        rgba(255,255,255,0.12);

      color: white;
    }

    .google-btn {

      background: white;
      color: black;

      margin-top: 18px;
    }

    .divider {

      margin: 18px 0;

      text-align: center;

      color:
        rgba(255,255,255,0.45);

      font-size: 13px;
    }

    .status {

      margin-top: 18px;

      text-align: center;

      color:
        rgba(255,255,255,0.8);

      font-size: 14px;

      min-height: 20px;
    }

    .back {

      display: block;

      text-align: center;

      margin-top: 22px;

      color:
        rgba(255,255,255,0.55);

      text-decoration: none;

      font-size: 14px;
    }

    .back:hover {

      color: white;
    }

  </style>
</head>

<body>

  <div class="login-box">

    <h1 id="title">
      Login
    </h1>

    <input
      type="email"
      id="email"
      placeholder="Email"
      autocomplete="email"
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
      autocomplete="current-password"
    >

    <button
      class="login-btn"
      id="loginBtn"
    >
      Login
    </button>

    <button
      class="register-btn"
      id="registerBtn"
    >
      Register
    </button>

    <div
      class="divider"
      id="orText"
    >
      OR
    </div>

    <button
      class="google-btn"
      id="googleBtn"
    >
      Continue with Google
    </button>

    <div
      class="status"
      id="status"
    ></div>

    <a
      class="back"
      href="/"
      id="backBtn"
    >
      ← Back
    </a>

  </div>

  <script>

    // ====================================
    // SUPABASE
    // ====================================

    const SUPABASE_URL =
      "https://ysffeiaeuuuhfxkwtumt.supabase.co";

    const SUPABASE_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzZmZlaWFldXV1aGZ4a3d0dW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTY3NjgsImV4cCI6MjA5MzEzMjc2OH0.fLCVXeNcUsycEiUlelLYwJQ4AGmG_MiL8ri2i5SXlmg";

    // FIX IMPORT
    const client =
      window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY
      );

    // ====================================
    // TRADUZIONI
    // ====================================

    const lang =
      navigator.language.toLowerCase();

    const translations = {

      it: {

        title: "Login",

        login: "Accedi",

        register: "Registrati",

        google:
          "Continua con Google",

        back:
          "← Torna alla home",

        or: "OPPURE",

        loginSuccess:
          "Login effettuato!",

        registerSuccess:
          "Account creato!",

        fillFields:
          "Compila tutti i campi"
      },

      en: {

        title: "Login",

        login: "Login",

        register: "Register",

        google:
          "Continue with Google",

        back:
          "← Back to home",

        or: "OR",

        loginSuccess:
          "Login successful!",

        registerSuccess:
          "Account created!",

        fillFields:
          "Fill all fields"
      },

      uk: {

        title: "Вхід",

        login: "Увійти",

        register: "Реєстрація",

        google:
          "Продовжити через Google",

        back:
          "← Назад",

        or: "АБО",

        loginSuccess:
          "Успішний вхід!",

        registerSuccess:
          "Акаунт створено!",

        fillFields:
          "Заповніть усі поля"
      }
    };

    let t = translations.en;

    if (lang.startsWith("it")) {
      t = translations.it;
    }

    else if (lang.startsWith("uk")) {
      t = translations.uk;
    }

    // ====================================
    // TESTI
    // ====================================

    document.getElementById("title")
      .innerText = t.title;

    document.getElementById("loginBtn")
      .innerText = t.login;

    document.getElementById("registerBtn")
      .innerText = t.register;

    document.getElementById("googleBtn")
      .innerText = t.google;

    document.getElementById("backBtn")
      .innerText = t.back;

    document.getElementById("orText")
      .innerText = t.or;

    // ====================================
    // STATUS
    // ====================================

    function setStatus(text) {

      document.getElementById("status")
        .innerText = text;
    }

    // ====================================
    // LOGIN
    // ====================================

    async function login() {

      const email =
        document.getElementById("email")
          .value.trim();

      const password =
        document.getElementById("password")
          .value.trim();

      if (!email || !password) {

        setStatus(t.fillFields);

        return;
      }

      try {

        const { error } =
          await client.auth
            .signInWithPassword({

              email,
              password
            });

        if (error) {

          setStatus(error.message);

          return;
        }

        setStatus(
          t.loginSuccess
        );

        setTimeout(() => {

          window.location.href = "/";

        }, 1000);

      } catch (err) {

        setStatus(err.message);
      }
    }

    // ====================================
    // REGISTER
    // ====================================

    async function register() {

      const email =
        document.getElementById("email")
          .value.trim();

      const password =
        document.getElementById("password")
          .value.trim();

      if (!email || !password) {

        setStatus(t.fillFields);

        return;
      }

      try {

        const { error } =
          await client.auth.signUp({

            email,
            password
          });

        if (error) {

          setStatus(error.message);

          return;
        }

        setStatus(
          t.registerSuccess
        );

      } catch (err) {

        setStatus(err.message);
      }
    }

    // ====================================
    // GOOGLE
    // ====================================

    async function googleLogin() {

      try {

        const { error } =
          await client.auth
            .signInWithOAuth({

              provider: "google",

              options: {

                redirectTo:
                  window.location.origin
              }
            });

        if (error) {

          setStatus(error.message);
        }

      } catch (err) {

        setStatus(err.message);
      }
    }

    // ====================================
    // EVENTS
    // ====================================

    document
      .getElementById("loginBtn")
      .addEventListener(
        "click",
        login
      );

    document
      .getElementById("registerBtn")
      .addEventListener(
        "click",
        register
      );

    document
      .getElementById("googleBtn")
      .addEventListener(
        "click",
        googleLogin
      );

  </script>

</body>
</html>
