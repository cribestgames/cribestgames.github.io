<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Login - CribestGames</title>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;

      background: rgb(54, 18, 18);

      font-family:
        'Segoe UI',
        Tahoma,
        Geneva,
        Verdana,
        sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;

      height: 100vh;

      color: white;
    }

    .login-box {
      width: 340px;

      padding: 35px;

      border-radius: 20px;

      background: rgba(255,255,255,0.05);

      backdrop-filter: blur(10px);

      box-shadow:
        0 0 30px rgba(0,0,0,0.3);
    }

    h1 {
      margin: 0 0 28px 0;

      text-align: center;

      font-size: 48px;
      font-weight: 700;
    }

    input {
      width: 100%;

      padding: 14px;

      margin-bottom: 16px;

      border: 1px solid rgba(255,255,255,0.12);

      border-radius: 12px;

      background: rgba(255,255,255,0.12);

      color: white;

      font-size: 15px;

      outline: none;

      box-sizing: border-box;

      transition: 0.2s;
    }

    input:focus {
      background: rgba(255,255,255,0.18);

      border-color:
        rgba(255,255,255,0.3);
    }

    input::placeholder {
      color:
        rgba(255,255,255,0.55);
    }

    button {
      width: 100%;

      padding: 13px;

      border: none;

      border-radius: 12px;

      font-size: 15px;
      font-weight: bold;

      cursor: pointer;

      transition: 0.2s;

      margin-top: 6px;
    }

    button:hover {
      transform: scale(1.02);
    }

    .login-btn {
      background: white;
      color: black;
    }

    .register-btn {
      background: rgba(255,255,255,0.12);
      color: white;
    }

    .google-btn {
      background: #ffffff;
      color: #000000;

      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;

      margin-top: 16px;
    }

    .divider {
      margin: 20px 0;

      text-align: center;

      color:
        rgba(255,255,255,0.4);

      font-size: 13px;
    }

    .status {
      margin-top: 18px;

      text-align: center;

      color:
        rgba(255,255,255,0.75);

      font-size: 14px;

      min-height: 20px;
    }

    .back {
      display: block;

      text-align: center;

      margin-top: 22px;

      color:
        rgba(255,255,255,0.55);

      text-decoration: none;

      font-size: 14px;
    }

    .back:hover {
      color: white;
    }
  </style>
</head>
<body>

  <div class="login-box">

    <h1 id="title">Login</h1>

    <input
      type="email"
      id="email"
      placeholder="Email"
      autocomplete="email"
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
      autocomplete="current-password"
    >

    <button
      class="login-btn"
      onclick="login()"
      id="loginBtn"
    >
      Login
    </button>

    <button
      class="register-btn"
      onclick="register()"
      id="registerBtn"
    >
      Register
    </button>

    <div class="divider" id="orText">
      OR
    </div>

    <button
      class="google-btn"
      onclick="googleLogin()"
      id="googleBtn"
    >
      <span>G</span>
      Continue with Google
    </button>

    <div class="status" id="status"></div>

    <a
      class="back"
      href="/"
      id="backBtn"
    >
      ← Back
    </a>

  </div>

  <script>

    // ====================================
    // SUPABASE
    // ====================================

    const supabaseUrl =
      'https://ysffeiaeuuuhfxkwtumt.supabase.co';

    const supabaseKey =
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzZmZlaWFldXV1aGZ4a3d0dW10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTY3NjgsImV4cCI6MjA5MzEzMjc2OH0.fLCVXeNcUsycEiUlelLYwJQ4AGmG_MiL8ri2i5SXlmg';

    const supabase =
      window.supabase.createClient(
        supabaseUrl,
        supabaseKey
      );

    // ====================================
    // TRADUZIONI
    // ====================================

    const lang =
      navigator.language.toLowerCase();

    const translations = {

      it: {
        title: "Login",
        login: "Accedi",
        register: "Registrati",
        google: "Continua con Google",
        back: "← Torna alla home",
        or: "OPPURE",

        loginSuccess:
          "Login effettuato!",

        registerSuccess:
          "Account creato!",

        redirecting:
          "Reindirizzamento..."
      },

      en: {
        title: "Login",
        login: "Login",
        register: "Register",
        google: "Continue with Google",
        back: "← Back to home",
        or: "OR",

        loginSuccess:
          "Login successful!",

        registerSuccess:
          "Account created!",

        redirecting:
          "Redirecting..."
      },

      uk: {
        title: "Вхід",
        login: "Увійти",
        register: "Реєстрація",
        google: "Продовжити через Google",
        back: "← Назад",
        or: "АБО",

        loginSuccess:
          "Успішний вхід!",

        registerSuccess:
          "Акаунт створено!",

        redirecting:
          "Перенаправлення..."
      }
    };

    let t = translations.en;

    if (lang.startsWith("it")) {
      t = translations.it;
    }
    else if (lang.startsWith("uk")) {
      t = translations.uk;
    }

    // ====================================
    // APPLICA TESTI
    // ====================================

    document.getElementById("title")
      .innerText = t.title;

    document.getElementById("loginBtn")
      .innerText = t.login;

    document.getElementById("registerBtn")
      .innerText = t.register;

    document.getElementById("backBtn")
      .innerText = t.back;

    document.getElementById("orText")
      .innerText = t.or;

    document.getElementById("googleBtn")
      .innerHTML =
        "<span>G</span> " + t.google;

    // ====================================
    // CONTROLLA LOGIN
    // ====================================

    async function checkUser() {

      const {
        data: { user }
      } = await supabase.auth.getUser();

      if (user) {

        document.getElementById("status")
          .innerText =
            t.redirecting;

        setTimeout(() => {
          window.location.href = "/";
        }, 1000);
      }
    }

    checkUser();

    // ====================================
    // LOGIN EMAIL
    // ====================================

    async function login() {

      const email =
        document.getElementById("email")
          .value;

      const password =
        document.getElementById("password")
          .value;

      if (!email || !password) {

        document.getElementById("status")
          .innerText =
            "Fill all fields";

        return;
      }

      const { error } =
        await supabase.auth
          .signInWithPassword({
            email,
            password
          });

      if (error) {

        document.getElementById("status")
          .innerText =
            error.message;

      } else {

        document.getElementById("status")
          .innerText =
            t.loginSuccess;

        setTimeout(() => {
          window.location.href = "/";
        }, 1000);
      }
    }

    // ====================================
    // REGISTER EMAIL
    // ====================================

    async function register() {

      const email =
        document.getElementById("email")
          .value;

      const password =
        document.getElementById("password")
          .value;

      if (!email || !password) {

        document.getElementById("status")
          .innerText =
            "Fill all fields";

        return;
      }

      const { error } =
        await supabase.auth.signUp({
          email,
          password
        });

      if (error) {

        document.getElementById("status")
          .innerText =
            error.message;

      } else {

        document.getElementById("status")
          .innerText =
            t.registerSuccess;
      }
    }

    // ====================================
    // GOOGLE LOGIN
    // ====================================

    async function googleLogin() {

      const { error } =
        await supabase.auth.signInWithOAuth({

          provider: 'google',

          options: {
            redirectTo:
              window.location.origin
          }
        });

      if (error) {

        document.getElementById("status")
          .innerText =
            error.message;
      }
    }

  </script>

</body>
</html>
