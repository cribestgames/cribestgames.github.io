<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream</title>
  <style>
    :root {
      color-scheme: dark;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      display: grid;
      place-items: center;
      background: #000;
    }

    video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      display: none;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }

    body.playing video {
      display: block;
      opacity: 1;
    }
  </style>
</head>
<body>
  <video id="bg-video" playsinline preload="none" loop>
    <source src="nggyu.webm" type="video/webm" />
  </video>

  <button id="play-btn" aria-label="Play">Play</button>

  <script>
    const video = document.getElementById('bg-video');
    const playBtn = document.getElementById('play-btn');

    // Start playback only after explicit user gesture
    if (playBtn) {
      playBtn.addEventListener('click', () => {
        playBtn.style.display = 'none';
        // ensure video element is shown and play
        video.style.display = 'block';
        video.play().then(() => {
          document.body.classList.add('playing');
        }).catch(() => {
          // still show UI state even if play() is blocked
          document.body.classList.add('playing');
        });
      }, { once: true });
    }
  </script>

  <style>
    #play-btn {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 0.6rem 1rem;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
      z-index: 9999;
    }
  </style>
</body>
</html>
