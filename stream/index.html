<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream</title>
  <style>
    :root {
      color-scheme: dark;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      display: grid;
      place-items: center;
      background: #000;
    }

    video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }

    body.ready video {
      opacity: 1;
    }
  </style>
</head>
<body>
  <video id="bg-video" autoplay muted playsinline loop preload="auto">
    <source src="nggyu.webm" type="video/webm" />
  </video>

  <button id="unmute-btn" aria-label="Attiva audio">Ascolta</button>

  <script>
    const video = document.getElementById('bg-video');
    const unmuteBtn = document.getElementById('unmute-btn');

    const showVideo = () => {
      document.body.classList.add('ready');
    };

    video.addEventListener('canplaythrough', showVideo, { once: true });
    video.addEventListener('playing', showVideo, { once: true });
    video.addEventListener('loadeddata', () => {
      if (video.readyState >= 2) {
        showVideo();
      }
    });

    video.addEventListener('error', () => {
      document.body.classList.add('ready');
    });

    // Try to autoplay muted (will usually succeed). User must unmute for sound.
    video.load();
    video.play().catch(() => {});

    // Unmute button: user gesture required by browsers to enable audio.
    const hideUnmute = () => {
      if (unmuteBtn) unmuteBtn.style.display = 'none';
    };

    const enableAudio = () => {
      try {
        video.muted = false;
        video.play().catch(() => {});
      } catch (e) {}
      hideUnmute();
    };

    if (unmuteBtn) {
      unmuteBtn.addEventListener('click', enableAudio, { once: true });
    }
  </script>

  <style>
    #unmute-btn {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 0.6rem 1rem;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
      z-index: 9999;
    }

    body.ready #unmute-btn {
      display: block;
    }

    /* Hide button once clicked */
    #unmute-btn[style*="display: none"] {
      display: none !important;
    }
  </style>
</body>
</html>
