<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream</title>
  <style>
    :root {
      color-scheme: dark;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      display: grid;
      place-items: center;
      background: #000;
    }

    video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }

    body.ready video {
      opacity: 1;
    }
  </style>
</head>
<body>
  <video id="bg-video" autoplay muted playsinline loop preload="auto">
    <source src="nggyu.webm" type="video/webm" />
  </video>

  <script>
    const video = document.getElementById('bg-video');

    const showVideo = () => {
      document.body.classList.add('ready');
    };

    video.addEventListener('canplaythrough', showVideo, { once: true });
    video.addEventListener('playing', showVideo, { once: true });
    video.addEventListener('loadeddata', () => {
      if (video.readyState >= 2) {
        showVideo();
      }
    });

    video.addEventListener('error', () => {
      document.body.classList.add('ready');
    });

    video.load();
    video.play().catch(() => {});
  </script>
</body>
</html>
